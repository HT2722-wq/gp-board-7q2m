<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>盯盘清单管理 · 草样预览</title>
<style>
  :root{
    --ink:#1d2330; --sub:#6b7280; --hint:#9aa0a8;
    --line:#e9ebf1; --card:#fff; --bg:#eef0f4; --soft:#f1f3f7;
    --blue:#2f6df0; --blue-bg:#e8f0ff; --blue-line:#cfe0fb;
    --ok:#159a57; --ok-bg:#e7f7ef;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;padding:16px;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.6;}
  .wrap{max-width:680px;margin:0 auto;}
  .banner{background:var(--blue-bg);border:1px solid var(--blue-line);color:#2f5fae;border-radius:10px;
    padding:8px 12px;font-size:13px;margin-bottom:14px;}
  .top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
  h1{margin:0 0 4px;font-size:20px;font-weight:700;}
  .sub{margin:0;font-size:13.5px;color:var(--sub);}
  .stat{background:var(--card);border:1px solid var(--line);box-shadow:0 1px 3px rgba(20,30,60,.05);
    border-radius:12px;padding:9px 16px;text-align:center;min-width:120px;}
  .stat .lab{font-size:12.5px;color:var(--sub);}
  .stat .num{font-size:24px;font-weight:800;}
  .stat .num small{font-size:14px;color:var(--sub);font-weight:400;}
  .tools{display:flex;gap:8px;margin-bottom:14px;}
  button{font:inherit;border:1px solid var(--line);background:#fff;color:var(--sub);
    border-radius:16px;padding:7px 14px;cursor:pointer;font-size:14px;}
  button:active{transform:scale(.98);}
  .card{background:var(--card);border:1px solid var(--line);box-shadow:0 1px 3px rgba(20,30,60,.05);
    border-radius:14px;padding:6px 14px;margin-bottom:12px;}
  .ghead{font-size:12.5px;color:var(--sub);font-weight:700;padding:8px 0 3px;}
  label.row{display:flex;align-items:center;gap:11px;padding:10px 2px;border-bottom:1px solid var(--line);cursor:pointer;}
  label.row:last-child{border-bottom:none;}
  .row input{width:19px;height:19px;accent-color:var(--blue);flex:0 0 auto;margin:0;}
  .nm{font-size:16px;font-weight:700;}
  .cd{font-size:12px;color:var(--sub);font-family:ui-monospace,Menlo,Consolas,monospace;}
  .chip{margin-left:auto;font-size:11px;color:#4b5563;background:var(--soft);padding:2px 9px;border-radius:6px;}
  .savebar{margin-top:18px;border-top:1px solid var(--line);padding-top:14px;
    display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .note{margin:0;font-size:12.5px;color:var(--sub);}
  .save{border:1px solid var(--blue);background:var(--blue);color:#fff;font-weight:600;padding:9px 18px;font-size:15px;border-radius:10px;}
  .toast{display:none;margin-top:12px;background:var(--ok-bg);color:var(--ok);border:1px solid #c6e8d4;border-radius:8px;padding:10px 13px;font-size:14px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="banner">这是「盯盘清单管理」的草样预览 —— 能勾、能看效果,但还<b>不是真的能用</b>;你看顺眼了我再做成真页面。</div>

  <div class="top">
    <div>
      <h1>👁 盯盘清单管理</h1>
      <p class="sub">勾选你要实时盯的股票,调好后点最下面的保存。看板照样显示全部。</p>
    </div>
    <div class="stat">
      <div class="lab">正在盯</div>
      <div class="num"><span id="cnt">42</span> <small>/ 42 只</small></div>
    </div>
  </div>

  <div class="tools">
    <button onclick="setAll(true)">☑ 全选</button>
    <button onclick="setAll(false)">☐ 全不选</button>
  </div>

  <div id="list"></div>

  <div class="savebar">
    <p class="note">ⓘ 保存后约 1–2 分钟自动生效,盯盘员按新名单盯,无需重启。</p>
    <button class="save" onclick="save()">💾 保存(<span id="savecnt">42</span> 只)</button>
  </div>
  <div class="toast" id="toast"></div>

</div>

<script>
var GROUPS=[
 {b:"半导体材料",s:[["立昂微","605358"],["沪硅产业","688126"],["西安奕材-U","688783"],["江丰电子","300666"]]},
 {b:"光模块",s:[["中际旭创","300308"],["新易盛","300502"],["联特科技","301205"]]},
 {b:"存储",s:[["澜起科技","688008"],["佰维存储","688525"],["大普微-UW","301666"]]},
 {b:"光器件",s:[["天孚通信","300394"],["光库科技","300620"]]},
 {b:"网络芯片",s:[["裕太微-U","688515"],["盛科通信-U","688702"]]},
 {b:"通信设备",s:[["信科移动-U","688387"],["上海瀚讯","300762"]]},
 {b:"PCB",s:[["沪电股份","002463"],["胜宏科技","300476"]]},
 {b:"MLCC",s:[["火炬电子","603678"],["风华高科","000636"]]}
];
var SINGLES=[
 ["寒武纪","688256","AI算力芯片"],["仕佳光子","688313","光芯片"],["长光华芯","688048","激光芯片"],
 ["晶晨股份","688099","端侧SoC"],["和林微纳","688661","半导体测试"],["盛合晶微","688820","封测"],
 ["东田微","301183","光学元件"],["沃格光电","603773","玻璃基板"],["永鼎股份","600105","光纤光缆"],
 ["昀冢科技","688260","结构件"],["瑞松科技","688090","机器人"],["凌云光","688400","机器视觉"],
 ["索辰科技","688507","CAE仿真"],["莱伯泰科","688056","检测仪器"],["中钨高新","000657","钨合金"],
 ["众泰汽车","000980","汽车整车"],["三晖电气","002857","智能电表"],["常山药业","300255","肝素血制品"],
 ["斯迪克","300806","功能膜"],["上海机电","600835","电梯"],["宏辉果蔬","603336","农业"],["诚达药业","301201","原料药CDMO"]
];
function row(n,c,chip){
 return '<label class="row"><input type="checkbox" class="mchk" checked onchange="recount()">'
  +'<span class="nm">'+n+'</span><span class="cd">'+c+'</span>'
  +(chip?'<span class="chip">'+chip+'</span>':'')+'</label>';
}
function head(t,n){return '<div class="ghead">'+t+' · '+n+'只</div>';}
var html="";
GROUPS.forEach(function(g){
 html+='<div class="card">'+head(g.b,g.s.length)+g.s.map(function(x){return row(x[0],x[1],"");}).join("")+'</div>';
});
html+='<div class="card">'+head("其他单只板块",SINGLES.length)+SINGLES.map(function(x){return row(x[0],x[1],x[2]);}).join("")+'</div>';
document.getElementById("list").innerHTML=html;
function recount(){
 var n=document.querySelectorAll(".mchk:checked").length;
 document.getElementById("cnt").textContent=n;
 document.getElementById("savecnt").textContent=n;
}
function setAll(v){var a=document.querySelectorAll(".mchk");for(var i=0;i<a.length;i++)a[i].checked=v;recount();}
function save(){
 var n=document.querySelectorAll(".mchk:checked").length;
 var t=document.getElementById("toast");
 t.style.display="block";
 t.innerHTML="✓ 已保存(示意):盯盘员将盯这 "+n+" 只。真页面会写进盯盘库,1–2 分钟生效。";
}
recount();
</script>
</body>
</html>
