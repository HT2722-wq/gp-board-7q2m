<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;}

.tabs{display:flex;background:#eef0f4;border-radius:11px;padding:3px;margin:10px 0 2px;}

.gbanner{background:linear-gradient(180deg,#fff6ec,#fffdfa);border:1px solid #ffe0bd;border-radius:12px;padding:11px 13px;margin-bottom:4px;}
.gh{font-size:13px;font-weight:700;color:#b8600f;}.gby{font-size:10px;color:#b9a06a;font-weight:400;margin-left:7px;}
.gchips{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0;}

.gsum{font-size:12.5px;color:#5a4a32;line-height:1.6;}

<header>
  <div class="h-title">📊 自选股信息速览表</div>

<script>
const DIM=["基本面","资金","估值","成长","技术","催化","情绪","风险"];
// 每个维度的 高/中/低 翻译成本维度的人话(蓝=对它有利,橙=不利,灰=一般)。
// 大脑评级口径:高=对它越有利(估值"高"=便宜、风险"高"=风险小),这里统一翻成不用反着想的词。
const DIMWORD=[
 {"高":"扎实","中":"一般","低":"偏弱"},   // 基本面
 {"高":"流入","中":"中性","低":"流出"},   // 资金
 {"高":"偏便宜","中":"合理","低":"偏贵"}, // 估值
 {"高":"较快","中":"平稳","低":"放缓"},   // 成长
 {"高":"偏强","中":"震荡","低":"偏弱"},   // 技术
 {"高":"较多","中":"一般","低":"偏少"},   // 催化
 {"高":"偏乐观","中":"中性","低":"偏谨慎"},// 情绪
 {"高":"较低","中":"一般","低":"较高"}    // 风险(高=风险小→偏蓝,低=风险大→偏橙)

const BOARDS={"光通信": {"name": "光通信产业链(上游→中游→系统端)", "svg": "<svg viewBox=\"0 0 360 396\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" font-family=\"-apple-system,'PingFang SC','Microsoft YaHei',sans-serif\">\n<title>光通信:一份数据从GPU走到另一台GPU(①-⑨竖版)</title><desc>①GPU→②铜线→③光模块(里面④电芯片⑤激光器⑥调制器⑦光器件)→⑧光纤→⑨交换机(两端光模块+ASIC)→回程光纤光模块铜线→另一台GPU。</desc>\n<defs><marker id=\"aro\" markerWidth=\"8\" markerHeight=\"8\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#aab4c2\"/></marker></defs>\n<rect x=\"0\" y=\"0\" width=\"360\" height=\"396\" rx=\"14\" fill=\"#fafdff\"/>\n\n<!-- ① GPU -->\n<rect x=\"116\" y=\"12\" width=\"128\" height=\"36\" rx=\"6\" fill=\"#e3f4ea\" stroke=\"#7fc9a3\" stroke-width=\"1.4\"/>\n<rect x=\"148\" y=\"19\" width=\"64\" height=\"22\" rx=\"3\" fill=\"#c4e7d5\"/><text x=\"180\" y=\"34\" font-size=\"10\" font-weight=\"700\" fill=\"#2e7d52\" text-anchor=\"middle\">GPU</text>\n<circle cx=\"116\" cy=\"12\" r=\"9\" fill=\"#74a9e0\"/><text x=\"116\" y=\"16\" font-size=\"11\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<text x=\"250\" y=\"33\" font-size=\"8.5\" fill=\"#8190a4\">算出数据要发走</text>\n<!-- ② 铜线 -->\n<line x1=\"180\" y1=\"48\" x2=\"180\" y2=\"66\" stroke=\"#d3a366\" stroke-width=\"4\" marker-end=\"url(#aro)\"/>\n<circle cx=\"180\" cy=\"57\" r=\"8\" fill=\"#cf9b5a\"/><text x=\"180\" y=\"61\" font-size=\"9.5\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">2</text>\n<text x=\"196\" y=\"61\" font-size=\"9\" fill=\"#b07d3a\">铜线(电信号)</text>\n\n<!-- ③ 光模块(里面 ④⑤⑥⑦) -->\n<rect x=\"10\" y=\"70\" width=\"340\" height=\"92\" rx=\"10\" fill=\"#fffaf0\" stroke=\"#eecb7e\" stroke-width=\"2.2\"/>\n<circle cx=\"10\" cy=\"70\" r=\"9\" fill=\"#e0b25e\"/><text x=\"10\" y=\"74\" font-size=\"11\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<text x=\"26\" y=\"84\" font-size=\"9.5\" font-weight=\"700\" fill=\"#b8870f\">光模块:把电变成光(里面装着 ④⑤⑥⑦)</text>\n<rect x=\"16\" y=\"92\" width=\"76\" height=\"58\" r \"180\" y2=\"180\" stroke=\"#e6b765\" stroke-width=\"4\" marker-end=\"url(#aro)\"/>\n<circle cx=\"180\" cy=\"171\" r=\"8\" fill=\"#62bd90\"/><text x=\"180\" y=\"175\" font-size=\"9.5\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">8</text>\n<text x=\"196\" y=\"175\" font-size=\"9\" fill=\"#b07d3a\">光纤(光在里面跑)</text>\n\n<!-- ⑨ 交换机:两端光模块 + ASIC虚线 -->\n<rect x=\"10\" y=\"184\" width=\"340\" height=\"62\" rx=\"10\" fill=\"#eef2f8\" stroke=\"#a6b6cf\" stroke-width=\"1.6\"/>\n<circle cx=\"10\" cy=\"184\" r=\"9\" fill=\"#a187dc\"/><text x=\"10\" y=\"188\" font-size=\"11\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">9</text>\n<text x=\"26\" y=\"198\" font-size=\"9.5\" font-weight=\"700\" fill=\"#516079\">交换机:中转(两端各插光模块,中间 ASIC 决定送哪台)</text>\n<rect x=\"22\" y=\"212\" width=\"56\" height=\"22\" rx=\"4\" fill=\"#fbe6b8\" stroke=\"#e1c682\"/><text x=\"50\" y=\"227\" font-size=\"8\" font-weight=\"700\" fill=\"#9c7320\" text-anchor=\"middle\">光模块</text>\n<line x1=\"78\" y1=\"223\" x2=\"118\" y2=\"223\" stroke=\"#aab4c2\" stroke-width=\"1.6\" marker-end=\"url(#aro)\"/>\n<rect x=\"118\" y=\"208\" width=\"120\" height=\"30\" rx=\"5\" fill=\"#f2ecfb\" stroke=\"#b39ee3\" stroke-width=\"1.3\" stroke-dasharray=\"5 3\"/><text x=\"178\" y=\"227\" font-size=\"9\" font-weight=\"700\" fill=\"#6b4fb0\" text-anchor=\"middle\">交换ASIC(虚线框)</text>\n<line x1=\"238\" y1=\"223\" x2=\"278\" y2=\"223\" stroke=\"#aab4c2\" stroke-width=\"1.6\" marker-end=\"url(#aro)\"/>\n<rect x=\"278\" y=\"212\" width=\"56\" height=\"22\" rx=\"4\" fill=\"#fbe6b8\" stroke=\"#e1c682\"/><text x=\"306\" y=\"227\" font-size=\"8\" font-weight=\"700\" fill=\"#9c7320\" text-anchor=\"middle\">光模块</text>\n\n<!-- 回程 -->\n<line x1=\"180\" y1=\"246\" x2=\"180\" y2=\"262\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#aro)\"/>\n<text x=\"180\" y=\"278\" font-size=\"9.5\" fill=\"#8593a6\" text-anchor=\"middle\">回程反着走一遍:⑧光纤 → ③光模块(光变回电)→ ②铜线 ↓</text>\n<!-- 另一台 GPU -->\n<rect x=\"116\" y=\"288\" width=\"128\" height=\"36\" rx=\"6\" fill=\"#e3f4ea\" stroke=\"#7fc9a3\" stroke-width=\"1.4\"/>\n<rect x=\"148\" y=\"295\" width=\"64\" height=\"22\" rx=\"3\" fill=\"#c4e7d5\"/><text x=\"180\" y=\"310\" font-size=\"10\" font-weight=\"700\" fill=\"#2e7d52\" text-anchor=\"middle\">GPU</text>\n<circle cx=\"116\" cy=\"288\" r=\"9\" fill=\"#74a9e0\"/><text x=\"116\" y=\"292\" font-size=\"11\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<text x=\"250\" y=\"309\" font-size=\"8.5\" fill=\"#8190a4\">另一台,收到接着算</text>\n</svg>", "flow": "① GPU:算 AI 的卡,先算出要发的数据(是电信号)。\n② 铜线:电信号从 GPU 沿主板上的铜线,走到光模块。\n③ 光模块:一个金色小盒子,把电变成光、对面再变回来的“翻译收发器”;它里面装着 ④⑤⑥⑦ 这几颗:\n④ 电芯片(DSP):盒子里第一关,把电信号整理干净、驱动激光器(这环海外主导,你暂时没持仓股)。\n⑤ 激光器(光芯片):会发激光的小芯片,把电变成一束光。\n⑥ 调制器:给这束光“装上数据”;短距离常和⑤激光器做在同一颗芯片里、不单算,长距离才单独用一个(所以叫旁支)。\n⑦ 光器件:不发光的小零件,把光对准、塞进光纤。透镜=聚光小凸镜;隔离器=只让光单向走、挡住反射;FAU=把多根光纤排齐对准的小阵列。\n⑧ 光纤:一根比头发还细的玻璃丝,光在里面跑、又快又远。\n⑨ 交换机:网络中转站,两端各插一个光模块,中间用虚线框圈出的“交换ASIC”决定数据送去哪台。\n回程:从交换机出来反着再走一遍——⑧光纤 → ③光模块(这次把光变回电)→ ②铜线 → 到①另一台 GPU,收到接着算。"}, "半导体材料": {"name": "造一颗芯片要用什么材料(①-⑥)", "svg": "<svg viewBox=\"0 0 360 360\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" font-family=\"-apple-system,'PingFang SC','Microsoft YaHei',sans-serif\">\n<title>造一颗芯片要用什么材料(①-⑥)</title><desc>①硅片画布→②光刻→③刻蚀→④镀膜(用靶材)→⑤抛光(②③④⑤重复几十层)→⑥切割封测成芯片。</desc>\n<defs><marker id=\"ars\" markerWidth=\"8\" markerHeight=\"8\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#aab4c2\"/></marker></defs>\n<rect x=\"0\" y=\"0\" width=\"360\" height=\"360\" rx=\"14\" fill=\"#fafdff\"/>\n<text x=\"16\" y=\"22\" font-size=\"12.5\" font-weight=\"700\" fill=\"#1d2433\">🏭 造一颗芯片,要用到哪些材料(在哪一步)</text>\n<line x1=\"40\" y1=\"44\" x2=\"40\" y2=\"320\" stroke=\"#dce3ee\" stroke-width=\"2\"/>\n<!-- ① 硅片 -->\n<circle cx=\"40\" cy=\"56\" r=\"15\" fill=\"#e9eef8\" stroke=\"#9fb4d4\" stroke-width=\"1.4\"/><line x1=\"30\" y1=\"64\" x2=\"36\" y2=\"58\" stroke=\"#9fb4d4\" stroke-width=\"1.4\"/>\n<circle cx=\"28\" cy=\"46\" r=\"8.5\" fill=\"#74a9e0\"/><text x=\"28\" y=\"50\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<text x=\"64\" y=\"52\" font-size=\"11\" font-weight=\"700\" fill=\"#3f5e88\">硅片:芯片的“画布”🧱材料</text>\n<text x=\"64\" y=\"66\" font-size=\"9\" fill=\"#7b8497\">圆圆的高纯硅盘子,电路都刻在它上面(12英寸最金贵)</text>\n<line x1=\"40\" y1=\"74\" x2=\"40\" y2=\"86\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#ars)\"/>\n<!-- ② 光刻 -->\n<rect x=\"27\" y=\"98\" width=\"26\" height=\"20\" rx=\"3\" fill=\"#f1eafb\" stroke=\"#bba6e6\"/><path d=\"M40,90 L34,98 L46,98 Z\" fill=\"#cdbcee\"/>\n<circle cx=\"28\" cy=\"96\" r=\"8.5\" fill=\"#a187dc\"/><text x=\"28\" y=\"100\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">2</text>\n<text x=\"64\" y=\"104\" font-size=\"11\" font-weight=\"700\" fill=\"#6b4fb0\">光刻:用光把电路图“印”上去</text>\n<text x=\"64\" y=\"118\" font-size=\"9\" fill=\"#7b8497\">光刻机 + 光刻胶,像照相一样把电路印到硅片上</text>\n<line x1=\"40\" y1=\"124\" x2=\"40\" y2=\"136\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#ars)\"/>\n<!-- ③ 刻蚀 -->\n<rect x=\"28\" y=\"148\" width=\"24\" height=\"18\" rx=\"2\" fill=\"#e4f4f5\" stroke=\"#79bfc6\"/><line x1=\"34\" y1=\"150\" x2=\"34\" y2=\"164\" stroke=\"#79bfc6\"/><line x1=\"40\" y1=\"150\" x2=\"40\" y2=\"164\" stroke=\"#79bfc6\"/><line x1=\"46\" y1=\"150\" x2=\"46\" y2=\"164\" stroke=\"#79bfc6\"/>\n<circle cx=\"28\" cy=\"146\" r=\"8.5\" fill=\"#56b7c1\"/><text x=\"28\" y=\"150\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<text x=\"64\" y=\"154\" font-size=\"11\" font-weight=\"700\" fill=\"#2f7a82\">刻蚀:把图形“雕”出来</text>\n<text x=\"64\" y=\"168\" font-size=\"9\" fill=\"#7b8497\">用特殊气体/腐蚀液,把没印上的地方雕掉、留下沟槽</text>\n<line x1=\"40\" y1=\"174\" x2=\"40\" y2=\"186\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#ars)\"/>\n<!-- ④ 镀膜(靶材) -->\n<rect x=\"28\" y=\"198\" width=\"24\" height=\"14\" rx=\"2\" fill=\"#fbe6b8\" stroke=\"#e1c682\"/><circle cx=\"34\" cy=\"218\" r=\"1.3\" fill=\"#cf9b5a\"/><circle cx=\"40\" cy=\"220\" r=\"1.3\" fill=\"#cf9b5a\"/><circle cx=\"46\" cy=\"218\" r=\"1.3\" fill=\"#cf9b5a\"/>\n<circle cx=\"28\" cy=\"196\" r=\"8.5\" fill=\"#d6a45a\"/><text x=\"28\" y=\"200\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">4</text>\n<text x=\"64\" y=\"204\" font-size=\"11\" font-weight=\"700\" fill=\"#b07d3a\">镀膜:喷镀金属做导线 🧱用“靶材”</text>\n<text x=\"64\" y=\"218\" font-size=\"9\" fill=\"#7b8497\">靶材=一块高纯金属,被离子打成原子、像喷漆镀上去(PVD)</text>\n<line x1=\"40\" y1=\"226\" x2=\"40\" y2=\"238\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#ars)\"/>\n<!-- ⑤ 抛光 -->\n<rect x=\"28\" y=\"250\" width=\"24\" height=\"8\" rx=\"2\" fill=\"#e8f5ee\" stroke=\"#7cc49b\"/><rect x=\"28\" y=\"246\" width=\"24\" height=\"4\" rx=\"1\" fill=\"#bfe3cd\"/>\n<circle cx=\"28\" cy=\"248\" r=\"8.5\" fill=\"#62bd90\"/><text x=\"28\" y=\"252\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">5</text>\n<text x=\"64\" y=\"254\" font-size=\"11\" font-weight=\"700\" fill=\"#2f7d56\">抛光(CMP):磨平,好叠下一层</text>\n<text x=\"64\" y=\"268\" font-size=\"9\" fill=\"#b07d3a\">↺ ②③④⑤ 这几步重复几十层,层层叠出一颗芯片</text>\n<line x1=\"40\" y1=\"276\" x2=\"40\" y2=\"288\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#ars)\"/>\n<!-- ⑥ 切割封测 -->\n<rect x=\"28\" y=\"300\" width=\"24\" height=\"18\" rx=\"2\" fill=\"#eef2f8\" stroke=\"#9fb4d4\"/><line x1=\"40\" y1=\"300\" x2=\"40\" y2=\"318\" stroke=\"#9fb4d4\"/><line x1=\"28\" y1=\"309\" x2=\"52\" y2=\"309\" stroke=\"#9fb4d4\"/>\n<circle cx=\"28\" cy=\"298\" r=\"8.5\" fill=\"#74a9e0\"/><text x=\"28\" y=\"302\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">6</text>\n<text x=\"64\" y=\"306\" font-size=\"11\" font-weight=\"700\" fill=\"#516079\">切割封测:切成小芯片、装壳出厂</text>\n<text x=\"64\" y=\"320\" font-size=\"9\" fill=\"#7b8497\">把晶圆切成一颗颗芯片,体检合格后出厂 = 成品芯片</text>\n</svg>", "flow": "造一颗芯片,像在一块圆盘上反复“印刷 + 叠层”,要用到这些材料:\n① 硅片:芯片的“画布”——一块圆圆的高纯硅盘子,所有电路都刻在它上面(12英寸大硅片最金贵、最卡脖子)。\n② 光刻:用光刻机 + 光刻胶,像照相一样把电路图“印”到硅片上。\n③ 刻蚀:用特殊气体或腐蚀液,把没印上的地方“雕”掉,留下电路沟槽。\n④ 镀膜:往沟槽里“喷镀”金属做导线——这一步用“靶材”:一块高纯金属原料,被离子打成一颗颗原子、像喷漆一样均匀镀到硅片上(这招叫 PVD / 物理喷镀)。\n⑤ 抛光(CMP):每叠一层就把表面磨平,好接着叠下一层。\n—— ②③④⑤ 重复几十上百次,层层叠出一颗芯片;全程还反复用“清洗液”洗硅片 ——\n⑥ 切割封测:把晶圆切成一颗颗小芯片、装上外壳、体检合格后出厂,就是成品芯片。"}, "存储": {"name": "存储芯片产业链(①-⑥)", "svg": "<svg viewBox=\"0 0 360 232\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" font-family=\"-apple-system,'PingFang SC','Microsoft YaHei',sans-serif\">\n<title>一条内存条怎么做成、里面有什么(①-⑥)</title><desc>①裸颗粒经④封测⑤模组做成内存条(板上有颗粒②主控③接口),再插进⑥电脑或AI服务器。颗粒最核心、三星长江存储造,这几只都不造。</desc>\n<defs><marker id=\"arm\" markerWidth=\"8\" markerHeight=\"8\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#aab4c2\"/></marker></defs>\n<rect x=\"0\" y=\"0\" width=\"360\" height=\"232\" rx=\"14\" fill=\"#fafdff\"/>\n<text x=\"16\" y=\"22\" font-size=\"12.5\" font-weight=\"700\" fill=\"#33405a\">💾 一条内存条 = 3 个零件,经 2 道加工做成</text>\n<!-- 第一步:3个零件 ①②③ -->\n<text x=\"14\" y=\"40\" font-size=\"9\" font-weight=\"700\" fill=\"#6b7790\">① 先有 3 个零件</text>\n<rect x=\"14\" y=\"48\" width=\"50\" height=\"32\" rx=\"5\" fill=\"#e9edf5\" stroke=\"#aab9d2\"/><text x=\"39\" y=\"68\" font-size=\"10\" font-weight=\"700\" fill=\"#45577a\" text-anchor=\"middle\">颗粒</text>\n<circle cx=\"14\" cy=\"48\" r=\"8.5\" fill=\"#8096b9\"/><text x=\"14\" y=\"52\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<rect x=\"68\" y=\"48\" width=\"50\" height=\"32\" rx=\"5\" fill=\"#efe9f3\" stroke=\"#c4b1cc\"/><text x=\"93\" y=\"68\" font-size=\"10\" font-weight=\"700\" fill=\"#6a5176\" text-anchor=\"middle\">主控</text>\n<circle cx=\"68\" cy=\"48\" r=\"8.5\" fill=\"#a98cb5\"/><text x=\"68\" y=\"52\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">2</text>\n<rect x=\"122\" y=\"48\" width=\"56\" height=\"32\" rx=\"5\" fill=\"#e4eff0\" stroke=\"#a6c9cc\"/><text x=\"150\" y=\"68\" font-size=\"10\" font-weight=\"700\" fill=\"#3d7077\" text-anchor=\"middle\">接口</text>\n<circle cx=\"122\" cy=\"48\" r=\"8.5\" fill=\"#5fa1a8\"/><text x=\"122\" y=\"52\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<!-- 第二步:两道加工 ④⑤ -->\n<line x1=\"178\" y1=\"64\" x2=\"194\" y2=\"64\" stroke=\"#b8c0cc\" stroke-width=\"2\" marker-end=\"url(#arm)\"/>\n<rect x=\"194\" y=\"48\" width=\"92\" height=\"32\" rx=\"8\" fill=\"#f4ece0\" stroke=\"#d9c6a6\" stroke-dasharray=\"5 3\"/><text x=\"240\" y=\"62\" font-size=\"8.5\" font-weight=\"700\" fill=\"#927549\" text-anchor=\"middle\">⚙ 封测 → 模组</text><text x=\"240\" y=\"73\" font-size=\"7\" fill=\"#a98f63\" text-anchor=\"middle\">(两道加工)</text>\n<circle cx=\"194\" cy=\"48\" r=\"8.5\" fill=\"#c3a675\"/><text x=\"194\" y=\"52\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">4</text>\n<circle cx=\"286\" cy=\"48\" r=\"8.5\" fill=\"#c3a675\"/><text x=\"286\" y=\"52\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">5</text>\n<line x1=\"240\" y1=\"80\" x2=\"240\" y2=\"96\" stroke=\"#b8c0cc\" stroke-width=\"2\" marker-end=\"url(#arm)\"/>\n<!-- 第三步:做成一整条内存条 -->\n<text x=\"14\" y=\"100\" font-size=\"9\" font-weight=\"700\" fill=\"#4a8268\">→ 做成一整条内存条(= ①②③ 装好的):</text>\n<rect x=\"14\" y=\"104\" width=\"240\" height=\"62\" rx=\"6\" fill=\"#5f9e7d\" stroke=\"#4a8268\" stroke-width=\"1.5\"/>\n<rect x=\"22\" y=\"116\" width=\"42\" height=\"38\" rx=\"3\" fill=\"#39434f\"/><text x=\"43\" y=\"137\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">颗粒</text><text x=\"43\" y=\"147\" font-size=\"6.5\" fill=\"#b6bfca\" text-anchor=\"middle\">存数据</text>\n<rect x=\"70\" y=\"116\" width=\"46\" height=\"38\" rx=\"3\" fill=\"#39434f\"/><text x=\"93\" y=\"137\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">主控</text><text x=\"93\" y=\"147\" font-size=\"6.5\" fill=\"#b6bfca\" text-anchor=\"middle\">管理员</text>\n<rect x=\"122\" y=\"116\" width=\"78\" height=\"38\" rx=\"3\" fill=\"#39434f\"/><text x=\"161\" y=\"137\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">接口芯片</text><text x=\"161\" y=\"147\" font-size=\"6.5\" fill=\"#b6bfca\" text-anchor=\"middle\">收费站</text>\n<g fill=\"#cbb083\"><rect x=\"22\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"42\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"62\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"82\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"102\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"122\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"142\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"162\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"182\" y=\"158\" width=\"12\" height=\"5\"/></g>\n<line x1=\"254\" y1=\"135\" x2=\"270\" y2=\"135\" stroke=\"#b8c0cc\" stroke-width=\"2\" marker-end=\"url(#arm)\"/>\n<rect x=\"272\" y=\"110\" width=\"74\" height=\"54\" rx=\"7\" fill=\"#edf0f5\" stroke=\"#b1bccd\"/><rect x=\"272\" y=\"128\" width=\"7\" height=\"18\" rx=\"1\" fill=\"#d4dce8\"/>\n<text x=\"312\" y=\"134\" font-size=\"9\" font-weight=\"700\" fill=\"#4a5568\" text-anchor=\"middle\">电脑/</text><text x=\"312\" y=\"147\" font-size=\"9\" font-weight=\"700\" fill=\"#4a5568\" text-anchor=\"middle\">AI服务器</text>\n<circle cx=\"272\" cy=\"110\" r=\"8.5\" fill=\"#8096b9\"/><text x=\"272\" y=\"114\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">6</text>\n<!-- 文字说明 -->\n<text x=\"16\" y=\"186\" font-size=\"9.5\" font-weight=\"700\" fill=\"#9c6a6a\">★① 颗粒 = 存数据的“仓库”,三星/长江存储造 —— 这几只都不造、得买它</text>\n<text x=\"16\" y=\"204\" font-size=\"9.5\" fill=\"#5a6b7b\">② 主控 = “管理员”(决定怎么存)　③ 接口 = CPU↔内存的“收费站”</text>\n<text x=\"16\" y=\"222\" font-size=\"9.5\" fill=\"#5a6b7b\">④ 封测 = 把零件封成成品芯片　⑤ 模组 = 贴到板上攒成 → ⑥ 插进电脑用</text>\n</svg>", "flow": "把数据存进存储芯片,像“把字写进一个铁笔记本”,这条链分 6 环:\n① 存储颗粒·原厂:真正“存数据的肉身”——一片片晶圆造出 NAND(闪存)、DRAM(内存)颗粒,数据最后就存在它里面。★这是全链最核心、最卡脖子的一环(三星/海力士/美光、国产长江存储/长鑫造);⚠️ 注意:你关注的这几只都不造颗粒、得向原厂买。\n② 主控芯片:存储的“仓库管理员”——决定数据存哪、怎么纠错不丢、跑多快;SSD 性能好不好主要看它。\n③ 接口芯片:CPU 和内存条之间的“高速收费站”——只管让数据跑得又快又稳、不出错(DDR5 时代必备)。\n④ 封装测试:把裸颗粒“封”进外壳、做成能用的成品芯片,再体检挑出好坏。\n⑤ 模组/成品:把颗粒+主控攒成内存条、SSD、手机存储(UFS)这些能插进设备的成品。\n⑥ 终端:手机、电脑、AI 服务器——最终用存储的地方,AI 服务器对高速存储最饥渴。"}, "网络芯片": {"name": "掀开交换机看里面的电路板(①-③)", "svg": "<svg viewBox=\"0 0 360 296\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" font-family=\"-apple-system,'PingFang SC','Microsoft YaHei',sans-serif\">\n<title>掀开一台交换机看里面的电路板(①-③)</title><desc>俯视一块交换机电路板:前面板网口→①PHY物理层(裕太微)→②MAC虚线集成→③中央交换ASIC(盛科);灰色CPU/内存/供电是配角。PHY管信号通不通、ASIC管数据往哪走。</desc>\n<defs><marker id=\"arn\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#b6cabc\"/></marker></defs>\n<rect x=\"0\" y=\"0\" width=\"360\" height=\"296\" rx=\"14\" fill=\"#fafdff\"/>\n<text x=\"16\" y=\"22\" font-size=\"12.5\" font-weight=\"700\" fill=\"#1d2433\">🔌 掀开一台交换机,看里面的电路板</text>\n<!-- 外壳(整机) -->\n<rect x=\"14\" y=\"34\" width=\"332\" height=\"150\" rx=\"10\" fill=\"#eef1f4\" stroke=\"#c5ccd6\"/>\n<text x=\"24\" y=\"48\" font-size=\"8.5\" fill=\"#97a1b1\">交换机掀盖 · 从上往下看这块板</text>\n<!-- 绿电路板 -->\n<rect x=\"22\" y=\"56\" width=\"312\" height=\"120\" rx=\"6\" fill=\"#e7f0ea\" stroke=\"#93bca5\"/>\n<line x1=\"34\" y1=\"61\" x2=\"320\" y2=\"61\" stroke=\"#d3e6da\" stroke-width=\"1\"/>\n<line x1=\"34\" y1=\"171\" x2=\"214\" y2=\"171\" stroke=\"#d3e6da\" stroke-width=\"1\"/>\n<!-- 前面板:网口/光口 -->\n<rect x=\"30\" y=\"66\" width=\"20\" height=\"14\" rx=\"2\" fill=\"#39434f\"/><rect x=\"33\" y=\"71\" width=\"14\" height=\"3\" rx=\"1\" fill=\"#707e8d\"/>\n<rect x=\"30\" y=\"88\" width=\"20\" height=\"14\" rx=\"2\" fill=\"#39434f\"/><rect x=\"33\" y=\"93\" width=\"14\" height=\"3\" rx=\"1\" fill=\"#707e8d\"/>\n<rect x=\"30\" y=\"110\" width=\"20\" height=\"14\" rx=\"2\" fill=\"#39434f\"/><rect x=\"33\" y=\"115\" width=\"14\" height=\"3\" rx=\"1\" fill=\"#707e8d\"/>\n<rect x=\"30\" y=\"132\" width=\"20\" height=\"14\" rx=\"2\" fill=\"#39434f\"/><rect x=\"33\" y=\"137\" width=\"14\" height=\"3\" rx=\"1\" fill=\"#707e8d\"/>\n<text x=\"40\" y=\"166\" font-size=\"8\" font-weight=\"700\" fill=\"#5f7180\" text-anchor=\"middle\">网口</text>\n<!-- ① PHY 芯片(黄=裕太微) -->\n<rect x=\"58\" y=\"67\" width=\"22\" height=\"12\" rx=\"2\" fill=\"#f3dd9b\" stroke=\"#cba94e\"/>\n<rect x=\"58\" y=\"89\" width=\"22\" height=\"12\" rx=\"2\" fill=\"#f3dd9b\" stroke=\"#cba94e\"/>\n<rect x=\"58\" y=\"111\" width=\"22\" height=\"12\" rx=\"2\" fill=\"#f3dd9b\" stroke=\"#cba94e\"/>\n<rect x=\"58\" y=\"133\" width=\"22\" height=\"12\" rx=\"2\" fill=\"#f3dd9b\" stroke=\"#cba94e\"/>\n<circle cx=\"69\" cy=\"57\" r=\"8.5\" fill=\"#e3b34a\" stroke=\"#c2922f\"/><text x=\"69\" y=\"61\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<text x=\"69\" y=\"166\" font-size=\"8\" font-weight=\"700\" fill=\"#9a7b2e\" text-anchor=\"middle\">PHY</text>\n<!-- 走线汇聚:网口→PHY→MAC→ASIC -->\n<line x1=\"80\" y1=\"73\" x2=\"92\" y2=\"73\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<line x1=\"80\" y1=\"95\" x2=\"92\" y2=\"95\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<line x1=\"80\" y1=\"117\" x2=\"92\" y2=\"117\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<line x1=\"80\" y1=\"139\" x2=\"92\" y2=\"139\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<line x1=\"92\" y1=\"73\" x2=\"92\" y2=\"139\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<line x1=\"92\" y1=\"107\" x2=\"98\" y2=\"107\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<!-- ② MAC 虚线(常集成) -->\n<rect x=\"98\" y=\"98\" width=\"34\" height=\"18\" rx=\"3\" fill=\"#eef4f0\" stroke=\"#93bca5\" stroke-dasharray=\"4 3\"/>\n<circle cx=\"98\" cy=\"91\" r=\"8\" fill=\"#e3b34a\" stroke=\"#c2922f\"/><text x=\"98\" y=\"95\" font-size=\"9.5\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">2</text>\n<text x=\"115\" y=\"111\" font-size=\"8.5\" font-weight=\"700\" fill=\"#5f8a72\" text-anchor=\"middle\">MAC</text>\n<line x1=\"132\" y1=\"107\" x2=\"150\" y2=\"112\" stroke=\"#b6cabc\" stroke-width=\"1.3\" marker-end=\"url(#arn)\"/>\n<!-- ③ 交换 ASIC(黄=盛科) -->\n<rect x=\"150\" y=\"80\" width=\"74\" height=\"64\" rx=\"4\" fill=\"#f3dd9b\" stroke=\"#cba94e\" stroke-width=\"1.6\"/>\n<rect x=\"162\" y=\"92\" width=\"50\" height=\"40\" rx=\"2\" fill=\"#ecd089\"/>\n<circle cx=\"150\" cy=\"80\" r=\"9\" fill=\"#e3b34a\" stroke=\"#c2922f\"/><text x=\"150\" y=\"84\" font-size=\"10.5\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<text x=\"187\" y=\"108\" font-size=\"10.5\" font-weight=\"700\" fill=\"#8a6d24\" text-anchor=\"middle\">交换 ASIC</text>\n<text x=\"187\" y=\"124\" font-size=\"8\" fill=\"#a87f30\" text-anchor=\"middle\">★ 整机大脑</text>\n<!-- 配角(灰):CPU/内存/供电 -->\n<rect x=\"238\" y=\"66\" width=\"42\" height=\"22\" rx=\"3\" fill=\"#eef1f4\" stroke=\"#ccd4de\"/><text x=\"259\" y=\"80\" font-size=\"7.5\" fill=\"#aeb7c4\" text-anchor=\"middle\">CPU</text>\n<rect x=\"286\" y=\"66\" width=\"44\" height=\"22\" rx=\"3\" fill=\"#eef1f4\" stroke=\"#ccd4de\"/><text x=\"308\" y=\"80\" font-size=\"7.5\" fill=\"#aeb7c4\" text-anchor=\"middle\">内存</text>\n<rect x=\"238\" y=\"96\" width=\"92\" height=\"30\" rx=\"3\" fill=\"#eef1f4\" stroke=\"#ccd4de\"/><text x=\"284\" y=\"114\" font-size=\"7.5\" fill=\"#aeb7c4\" text-anchor=\"middle\">供电模块</text>\n<text x=\"238\" y=\"140\" font-size=\"7\" fill=\"#b9c1cc\">灰=配角·非这两只做</text>\n<!-- 底部文字说明 -->\n<text x=\"16\" y=\"200\" font-size=\"9\" font-weight=\"700\" fill=\"#9a7b2e\">① PHY 物理层〔🟡裕太微〕:网口“收发员”,信号↔数字互译,没它不通</text>\n<text x=\"16\" y=\"220\" font-size=\"9\" fill=\"#2f7a82\">② MAC:认地址、切成数据包;常并进①或③里(画虚线)</text>\n<text x=\"16\" y=\"240\" font-size=\"9\" font-weight=\"700\" fill=\"#8a6d24\">③ 交换 ASIC〔🟡盛科〕:正中最大那颗,整机大脑,决定数据走哪个口</text>\n<text x=\"16\" y=\"260\" font-size=\"9\" fill=\"#5f7180\">网口/光口:插网线或光模块,数据从这进出(本身不是芯片)</text>\n<text x=\"16\" y=\"282\" font-size=\"9\" font-weight=\"700\" fill=\"#516079\">一句话:① PHY 管“信号通不通”,③ ASIC 管“数据往哪走”</text>\n</svg>", "flow": "掀开一台交换机从上往下看,就是一块电路板,上面的零件接力干活:\n· 前面板一排网口/光口:插网线或光模块的口子,数据从这儿进出(它本身不是芯片)。\n① PHY 物理层芯片〔裕太微做〕:每个网口后面都紧贴一颗。网线里跑电信号、光纤里跑光信号,机器内部认的是数字信号,PHY 负责两边互相翻译——没它,网口根本不通。\n② MAC 层:“门牌管理员”,认地址、把数据切成一个个数据包。它通常不是单独一颗芯片,而是被并进 ①PHY 或 ③ASIC 里(所以画成虚线)。\n③ 交换 ASIC〔盛科做〕:板子正中间最大那颗,整台设备的“大脑”。所有网口的数据都汇到它这儿,它瞬间判断每一包该从哪个口送出去,再甩回对应的口——这是交换机里最贵、最难做的核心芯片。\n灰色的 CPU / 内存 / 供电是配角,不是这两只做的。\n一句话记住:① PHY 管“信号通不通”(裕太微守在每个网口),③ 交换 ASIC 管“数据往哪走”(盛科坐镇正中大脑)——两个完全不同的环节,别混。"}, "MLCC": {"name": "造一颗 MLCC 陶瓷电容(①-⑥)", "svg": "<svg viewBox=\"0 0 360 358\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" font-family=\"-apple-system,'PingFang SC','Microsoft YaHei',sans-serif\">\n<title>造一颗MLCC陶瓷电容(①-⑥)</title><desc>①配料陶瓷粉→②流延薄膜→③印电极→④叠层→⑤烧结→⑥端电极切测成MLCC。难点在①粉体和⑤烧结。</desc>\n<defs><marker id=\"arc\" markerWidth=\"8\" markerHeight=\"8\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#aab4c2\"/></marker></defs>\n<rect x=\"0\" y=\"0\" width=\"360\" height=\"358\" rx=\"14\" fill=\"#fafdff\"/>\n<text x=\"16\" y=\"22\" font-size=\"12.5\" font-weight=\"700\" fill=\"#1d2433\">🔋 造一颗 MLCC 陶瓷电容(①-⑥)</text>\n<line x1=\"40\" y1=\"44\" x2=\"40\" y2=\"320\" stroke=\"#dce3ee\" stroke-width=\"2\"/>\n<rect x=\"29\" y=\"50\" width=\"22\" height=\"16\" rx=\"3\" fill=\"#fdeaea\" stroke=\"#e6a3a3\"/>\n<circle cx=\"28\" cy=\"48\" r=\"8.5\" fill=\"#d98a8a\"/><text x=\"28\" y=\"52\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<text x=\"64\" y=\"52\" font-size=\"11\" font-weight=\"700\" fill=\"#b05757\">配料:陶瓷粉调成浆 ★难点</text>\n<text x=\"64\" y=\"66\" font-size=\"9\" fill=\"#7b8497\">粉体越细越纯,电容能做得越小越高端(国产卡脖子的地方之一)</text>\n<line x1=\"40\" y1=\"72\" x2=\"40\" y2=\"84\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#arc)\"/>\n<rect x=\"28\" y=\"96\" width=\"24\" height=\"6\" rx=\"1\" fill=\"#f1eafb\" stroke=\"#bba6e6\"/>\n<circle cx=\"28\" cy=\"94\" r=\"8.5\" fill=\"#a187dc\"/><text x=\"28\" y=\"98\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">2</text>\n<text x=\"64\" y=\"100\" font-size=\"11\" font-weight=\"700\" fill=\"#6b4fb0\">流延:刮成极薄陶瓷膜</text>\n<text x=\"64\" y=\"114\" font-size=\"9\" fill=\"#7b8497\">把浆料刮成薄到几微米的膜,像保鲜膜一样薄</text>\n<line x1=\"40\" y1=\"120\" x2=\"40\" y2=\"132\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#arc)\"/>\n<rect x=\"28\" y=\"144\" width=\"24\" height=\"8\" rx=\"1\" fill=\"#e4f4f5\" stroke=\"#79bfc6\"/><rect x=\"30\" y=\"146\" width=\"20\" height=\"2\" fill=\"#56b7c1\"/>\n<circle cx=\"28\" cy=\"142\" r=\"8.5\" fill=\"#56b7c1\"/><text x=\"28\" y=\"146\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<text x=\"64\" y=\"150\" font-size=\"11\" font-weight=\"700\" fill=\"#2f7a82\">印刷:印上金属内电极</text>\n<text x=\"64\" y=\"164\" font-size=\"9\" fill=\"#7b8497\">在陶瓷膜上印一层金属电极</text>\n<line x1=\"40\" y1=\"170\" x2=\"40\" y2=\"182\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#arc)\"/>\n<rect x=\"30\" y=\"192\" width=\"20\" height=\"20\" rx=\"1\" fill=\"#e8f5ee\" stroke=\"#7cc49b\"/><line x1=\"30\" y1=\"197\" x2=\"50\" y2=\"197\" stroke=\"#7cc49b\"/><line x1=\"30\" y1=\"202\" x2=\"50\" y2=\"202\" stroke=\"#7cc49b\"/><line x1=\"30\" y1=\"207\" x2=\"50\" y2=\"207\" stroke=\"#7cc49b\"/>\n<circle cx=\"28\" cy=\"192\" r=\"8.5\" fill=\"#62bd90\"/><text x=\"28\" y=\"196\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">4</text>\n<text x=\"64\" y=\"200\" font-size=\"11\" font-weight=\"700\" fill=\"#2f7d56\">叠层:几百层叠压在一起</text>\n<text x=\"64\" y=\"214\" font-size=\"9\" fill=\"#7b8497\">“陶瓷膜+电极”叠几百层,层数越多容量越大</text>\n<line x1=\"40\" y1=\"220\" x2=\"40\" y2=\"232\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#arc)\"/>\n<rect x=\"30\" y=\"244\" width=\"20\" height=\"16\" rx=\"2\" fill=\"#fdeaea\" stroke=\"#e6a3a3\"/><path d=\"M33,258 q3,-4 6,0 q3,-4 6,0\" stroke=\"#e6a3a3\" fill=\"none\"/>\n<circle cx=\"28\" cy=\"242\" r=\"8.5\" fill=\"#d98a8a\"/><text x=\"28\" y=\"246\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">5</text>\n<text x=\"64\" y=\"250\" font-size=\"11\" font-weight=\"700\" fill=\"#b05757\">烧结:高温烧成陶瓷块 ★难点</text>\n<text x=\"64\" y=\"264\" font-size=\"9\" fill=\"#7b8497\">高温窑炉烧成致密陶瓷,温度/气氛控制是核心难点</text>\n<line x1=\"40\" y1=\"270\" x2=\"40\" y2=\"282\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#arc)\"/>\n<rect x=\"30\" y=\"294\" width=\"20\" height=\"14\" rx=\"2\" fill=\"#fbe6b8\" stroke=\"#e1c682\"/><rect x=\"28\" y=\"298\" width=\"4\" height=\"6\" fill=\"#d6a45a\"/><rect x=\"48\" y=\"298\" width=\"4\" height=\"6\" fill=\"#d6a45a\"/>\n<circle cx=\"28\" cy=\"292\" r=\"8.5\" fill=\"#d6a45a\"/><text x=\"28\" y=\"296\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">6</text>\n<text x=\"64\" y=\"300\" font-size=\"11\" font-weight=\"700\" fill=\"#b07d3a\">端电极:封两头、切割测试</text>\n<text x=\"64\" y=\"314\" font-size=\"9\" fill=\"#7b8497\">两头封上金属端头、切开测试,就是成品 MLCC(比芝麻还小)</text>\n</svg>", "flow": "先搞懂“被动元件”:电路板上元件分两类——主动元件(芯片/CPU,会运算)和被动元件(电容/电阻/电感,不运算、只伺候芯片把电调顺)。\n· 电容像“小水库”:存电放电、稳住电压;芯片瞬间要大电流,旁边电容立刻“放水”补上,电压不掉。\n· 电阻像“限流闸”:限制电流、分压、保护元件。　· 电感像“缓冲罐”:阻止电流突变、滤掉杂波。\nMLCC = “片式多层陶瓷电容”,把陶瓷膜和金属电极叠几百层做成的微型电容,小的比芝麻还小;一台手机用上千颗、一个 AI 服务器机柜要用 40 多万颗(是普通服务器的 8-10 倍)。它怎么造:\n① 配料:陶瓷粉调成浆(粉越细越纯、电容越高端,★难点);② 流延:刮成几微米薄的陶瓷膜;③ 印刷:印上金属内电极;④ 叠层:几百层叠压(层数越多容量越大);⑤ 烧结:高温窑炉烧成致密陶瓷块(温度控制★难点);⑥ 端电极:两头封金属、切割测试,出成品。\n⚠️ 高端 MLCC 仍被日韩(村田/三星电机/太阳诱电)垄断,中国自给率不到10%、却占全球需求40%以上——这就是国产替代的空间;但替代主要在中低端,最高端短期还替不动。"}, "通信设备": {"name": "通信设备产业链(上游→设备→下游)", "svg": "<svg viewBox=\"0 0 360 286\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" font-family=\"-apple-system,'PingFang SC','Microsoft YaHei',sans-serif\">\n<title>通信设备产业链(上游→设备→下游)</title><desc>①上游芯片器件→②中游设备(军用专网/民用基站)→③下游(军方/运营商)。</desc>\n<defs><marker id=\"art\" markerWidth=\"8\" markerHeight=\"8\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#aab4c2\"/></marker></defs>\n<rect x=\"0\" y=\"0\" width=\"360\" height=\"286\" rx=\"14\" fill=\"#fafdff\"/>\n<text x=\"16\" y=\"22\" font-size=\"12.5\" font-weight=\"700\" fill=\"#1d2433\">📡 通信设备产业链(上游 → 设备 → 下游)</text>\n<!-- ① 上游 -->\n<rect x=\"110\" y=\"34\" width=\"140\" height=\"34\" rx=\"7\" fill=\"#e9eef8\" stroke=\"#9fb4d4\"/>\n<circle cx=\"110\" cy=\"34\" r=\"9\" fill=\"#74a9e0\"/><text x=\"110\" y=\"38\" font-size=\"11\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<text x=\"180\" y=\"49\" font-size=\"10.5\" font-weight=\"700\" fill=\"#3f5e88\" text-anchor=\"middle\">上游:芯片 + 器件</text>\n<text x=\"180\" y=\"62\" font-size=\"8.5\" fill=\"#7b8497\" text-anchor=\"middle\">通信芯片/射频器件/光模块/PCB（造设备的零件）</text>\n<line x1=\"180\" y1=\"68\" x2=\"180\" y2=\"82\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#art)\"/>\n<!-- ② 中游设备(分两支) -->\n<text x=\"180\" y=\"96\" font-size=\"10.5\" font-weight=\"700\" fill=\"#b07d3a\" text-anchor=\"middle\">② 中游:设备制造(钱最多的一环,分两支)</text>\n<rect x=\"18\" y=\"106\" width=\"158\" height=\"46\" rx=\"8\" fill=\"#e8f5ee\" stroke=\"#7cc49b\"/>\n<text x=\"97\" y=\"124\" font-size=\"10\" font-weight=\"700\" fill=\"#2f7d56\" text-anchor=\"middle\">军用 / 专网设备</text>\n<text x=\"97\" y=\"138\" font-size=\"8\" fill=\"#7b8497\" text-anchor=\"middle\">军队专属“5G”、专网装备</text>\n<rect x=\"184\" y=\"106\" width=\"158\" height=\"46\" rx=\"8\" fill=\"#f1eafb\" stroke=\"#bba6e6\"/>\n<text x=\"263\" y=\"124\" font-size=\"10\" font-weight=\"700\" fill=\"#6b4fb0\" text-anchor=\"middle\">民用 5G 基站设备</text>\n<text x=\"263\" y=\"138\" font-size=\"8\" fill=\"#7b8497\" text-anchor=\"middle\">运营商建网用的主设备</text>\n<line x1=\"97\" y1=\"152\" x2=\"97\" y2=\"166\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#art)\"/>\n<line x1=\"263\" y1=\"152\" x2=\"263\" y2=\"166\" stroke=\"#aab4c2\" stroke-width=\"2\" marker-end=\"url(#art)\"/>\n<!-- ③ 下游(两支) -->\n<rect x=\"18\" y=\"170\" width=\"158\" height=\"40\" rx=\"8\" fill=\"#eef2f8\" stroke=\"#9fb4d4\"/>\n<circle cx=\"26\" cy=\"178\" r=\"8.5\" fill=\"#62bd90\"/><text x=\"26\" y=\"182\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<text x=\"100\" y=\"188\" font-size=\"10\" font-weight=\"700\" fill=\"#2f7d56\" text-anchor=\"middle\">下游:军方</text>\n<text x=\"97\" y=\"202\" font-size=\"8\" fill=\"#7b8497\" text-anchor=\"middle\">买军用专网通信(看军费/采购)</text>\n<rect x=\"184\" y=\"170\" width=\"158\" height=\"40\" rx=\"8\" fill=\"#eef2f8\" stroke=\"#9fb4d4\"/>\n<circle cx=\"192\" cy=\"178\" r=\"8.5\" fill=\"#a187dc\"/><text x=\"192\" y=\"182\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<text x=\"266\" y=\"188\" font-size=\"10\" font-weight=\"700\" fill=\"#6b4fb0\" text-anchor=\"middle\">下游:运营商</text>\n<text x=\"263\" y=\"202\" font-size=\"8\" fill=\"#7b8497\" text-anchor=\"middle\">移动/电信/联通(看5G/6G建网)</text>\n<rect x=\"14\" y=\"224\" width=\"332\" height=\"48\" rx=\"9\" fill=\"#f4f7fc\" stroke=\"#e2e8f2\"/>\n<text x=\"26\" y=\"244\" font-size=\"9.5\" fill=\"#516079\">这 2 家都在“中游设备”,但卖给的下游完全不同:</text>\n<text x=\"26\" y=\"260\" font-size=\"9.5\" fill=\"#7b8497\">· 军用专网→军方(军工逻辑)　· 民用5G→运营商(5G/6G周期逻辑)——别搞混</text>\n</svg>", "flow": "把“造通信设备”想成一条流水线:\n① 上游:芯片 + 元器件(通信芯片、射频器件、光模块、PCB)——相当于造设备的“螺丝和发动机”。\n② 中游:设备制造(把零件拼成能用的机器)——这是产业链最核心、钱最多的一环,又分:基站类(发信号的网络主设备)、终端类(手机/对讲机/车载单兵)、专网/系统设备(军队/铁路/电网自己专用、不跟普通人共用的网)。\n③ 下游:买设备的人——运营商(移动/电信/联通,民用5G最大买家)、军方(买军用专网)、行业用户(铁路/电网/政府)。\n一句话:零件(上游)→ 拼成机器(中游)→ 卖给运营商/军队/行业(下游)。\n⚠️ 关键:这 2 只都在“中游设备”,但一个吃军费(军用专网→军方,军工逻辑)、一个吃运营商开支(民用5G→运营商,5G/6G周期逻辑),逻辑和风险完全不同,别搞混。"}};

      rows+='<tr style="border-top:1px solid #eef0f4">'+(i===0?`<td rowspan="${arr.length}" style="font-weight:700;padding:8px 9px;vertical-align:middle;background:#f7f8fa;white-space:nowrap">${k} <span style="color:#9aa0a8;font-weight:400;font-size:11px">${arr.length}</span></td>`:'')+`<td style="padding:8px 9px">${s.name}</td><td style="padding:8px 9px;color:#8a8f99;font-size:12px">${s.code||''}</td><td style="padding:8px 9px;text-align:right;font-weight:700;color:${col}">${s.pct>0?'+':''}${s.pct}%</td></tr>`;});});
  return `<div style="grid-column:1/-1"><table style="width:100%;border-collapse:collapse;font-size:13.5px;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #eef0f4"><thead><tr style="background:#eef2f8;color:#516079;font-size:12px"><th style="padding:8px 9px;text-align:left">板块</th><th style="padding:8px 9px;text-align:left">名称</th><th style="padding:8px 9px;text-align:left">代码</th><th style="padding:8px 9px;text-align:right">涨幅</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function render(){const list=STOCKS.filter(match).sort(sorter);
  document.getElementById('cnt').textContent=list.length;
  preBanner();
  if(TAB==='overview'){grid.innerHTML=overviewHTML(list);return;}
  grid.innerHTML=list.length?list.map(card).join(''):'<div class="empty">没有符合条件的股票</div>';}
chips.addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;
  chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');filter=c.dataset.f;render();});
document.getElementById('q').addEventListener('input',e=>{kw=e.target.value.trim();render();});
document.getElementById('sort').addEventListener('change',e=>{sort=e.target.value;render();});
document.getElementById('tabs').addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');TAB=t.dataset.t;
  document.getElementById('tabhint').textContent=TABHINT[TAB];render();});
render();
</script></body></html>
