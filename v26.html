<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自选股信息速览表</title>
<style>
:root{--up:#e8453c;--down:#15a35a;--flat:#8a8f99;--bg:#eef0f4;--card:#fff;--ink:#1d2330;--sub:#6b7280;--line:#e9ebf1;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;}
header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--line);padding:12px 14px 8px;}
.h-title{font-size:17px;font-weight:700;}.h-sub{font-size:12px;color:var(--sub);margin-top:2px;}
.toolbar{display:flex;gap:8px;align-items:center;margin-top:10px;}
.search{flex:1;border:1px solid var(--line);border-radius:20px;padding:7px 12px;font-size:14px;outline:none;}
select{border:1px solid var(--line);border-radius:20px;padding:7px 8px;font-size:13px;background:#fff;}
.chips{display:flex;gap:7px;overflow-x:auto;padding:9px 14px 4px;scrollbar-width:none;}.chips::-webkit-scrollbar{display:none;}
.chip{flex:none;border:1px solid var(--line);background:#fff;color:var(--sub);border-radius:16px;padding:5px 12px;font-size:13px;white-space:nowrap;cursor:pointer;}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.legend{font-size:11px;color:var(--sub);padding:6px 14px 0;line-height:1.6;}
main{padding:10px 12px 40px;display:grid;grid-template-columns:1fr;gap:13px;}
@media(min-width:880px){main{grid-template-columns:1fr 1fr;}}
.card{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--line);box-shadow:0 1px 3px rgba(20,30,60,.05);}
.strip{height:5px;}.card.up .strip{background:var(--up);}.card.down .strip{background:var(--down);}.card.flat .strip{background:var(--flat);}
.body{padding:14px 15px 15px;}
.row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.name{font-size:17px;font-weight:700;}.code{font-size:12px;color:var(--sub);margin-left:6px;}
.tag{font-size:11px;color:#fff;background:#8a93a6;border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.tag.kc{background:#7b61ff;}.tag.cy{background:#2f9e6b;}
.pct{font-size:22px;font-weight:800;text-align:right;line-height:1;}.pct small{font-size:12px;font-weight:600;display:block;color:var(--sub);margin-top:3px;}
.up .pct{color:var(--up);}.down .pct{color:var(--down);}.flat .pct{color:var(--flat);}
.meta{display:flex;gap:16px;margin:9px 2px 0;font-size:12px;color:var(--sub);flex-wrap:wrap;}.meta b{color:var(--ink);font-weight:600;}
.strong{color:var(--up);font-weight:700;}.weak{color:var(--down);font-weight:700;}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 0;}
.badge{font-size:11px;border-radius:6px;padding:2px 7px;}
.badge.risk{background:#fde7ee;color:var(--up);}.badge.lhb{background:#fff3e0;color:#c47a14;}
.badge.notice{background:#e8f0ff;color:#2f6df0;}.badge.report{background:#e7f7ef;color:#159a57;}
.sec{margin-top:14px;}.sh{font-size:13px;font-weight:700;margin-bottom:6px;}
.kv{font-size:12.5px;line-height:1.65;color:#3a4150;margin:3px 0;}.kv b{color:var(--ink);}
.pos{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px;}
.pill{font-size:11px;border-radius:6px;padding:2px 8px;background:#f1f3f7;color:#4b5563;}
.pill.cn{background:#fff3e0;color:#c47a14;}.pill.gl{background:#e8f0ff;color:#2f6df0;}.pill.bench{background:#f0eaff;color:#7b4fe0;}
.verdict{margin-top:8px;font-size:12.5px;line-height:1.65;color:#3a2f1d;background:#fff8e6;border:1px solid #ffe6a8;border-radius:9px;padding:9px 11px;}.verdict b{color:#b8860b;}
.chain,.flow{margin:7px 0;border-radius:9px;padding:8px 11px;font-size:12.5px;line-height:1.62;}
.chain{background:#eef6ff;border:1px solid #d6e6fb;}.chain>b{color:#2f6df0;display:block;margin-bottom:3px;}
.flow{background:#f7f1ff;border:1px solid #e6dafb;}.flow>b{color:#7b4fe0;display:block;margin-bottom:3px;}
.chain .pre,.flow .pre,.who .pre{white-space:pre-wrap;color:#3a4150;}
.who{margin:7px 0;border-radius:9px;padding:8px 11px;font-size:12.5px;line-height:1.62;background:#f1faf4;border:1px solid #cdeedd;}.who>b{color:#159a57;display:block;margin-bottom:3px;}
.flow.big,.who.big{font-size:17.5px;line-height:2.05;padding:14px 16px;}.flow.big>b,.who.big>b{font-size:18px;margin-bottom:8px;}
.makes.big{font-size:17px;line-height:1.9;padding:13px 15px;}
.vdiag{margin:8px 0;}.vdiag svg{width:100%;height:auto;display:block;border:1px solid #e7edf6;border-radius:11px;}
.boardlink{margin:7px 0;background:#eef6ff;border:1px solid #cfe0fb;border-radius:9px;padding:9px 11px;font-size:12.5px;font-weight:600;color:#2f6df0;cursor:pointer;line-height:1.5;}
.boardlink:active{background:#dfecff;}
.flowtip{font-size:11.5px;color:#7b8497;background:#f4f7fc;border-radius:8px;padding:7px 9px;margin-bottom:8px;line-height:1.55;}
.makes{margin:6px 0;background:#fff7e6;border:1px solid #ffe0a3;border-radius:9px;padding:8px 11px;font-size:12.5px;line-height:1.6;color:#7a5300;}.makes b{color:#b8770b;}
.peers{margin:7px 0;background:#eef4ff;border:1px solid #d6e4fb;border-radius:9px;padding:7px 11px;font-size:12px;line-height:1.6;color:#2f4a73;}.peers .peerhint{color:#9aa9c2;font-size:10.5px;margin-left:4px;}
.terms2{margin-top:9px;background:#f6f4ff;border-radius:9px;padding:6px 11px;}
.terms2>summary{color:#5b3fd0;font-weight:600;font-size:12px;cursor:pointer;list-style:none;}
.terms2>summary::-webkit-details-marker{display:none;}
.terms2>summary::before{content:'▸ ';}.terms2[open]>summary::before{content:'▾ ';}
.terms2 .ti2{font-size:12px;color:#3a4150;line-height:1.6;margin:5px 0;}.terms2 .ti2 b{color:#5b3fd0;}
.hot{background:#fff8f3;border:1px solid #ffe6d2;border-radius:9px;padding:10px 11px;font-size:12.5px;line-height:1.65;color:#5a4636;}
.hot .lab{font-weight:700;color:#c4581a;}.hot a{color:#2f6df0;text-decoration:none;}.hot .ev{display:block;margin:2px 0;}.hot .nodrv{color:var(--sub);}
.synth{font-size:12.5px;line-height:1.7;color:#3a4150;background:#f7f8fa;border-radius:9px;padding:10px 11px;}.synth i{color:#2f6df0;font-style:normal;font-weight:600;}
.scan{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
.si{font-size:11px;border-radius:6px;padding:2px 7px;background:#f1f3f7;color:#566;}
.si b{margin-left:3px;}.si.high b{color:#2f6df0;}.si.mid b{color:#8a929c;}.si.low b{color:#e07c16;}.si.na b{color:#b8bdc4;}
.pin{font-size:12.5px;font-weight:600;border-radius:8px;padding:7px 10px;margin:9px 0 2px;line-height:1.5;}
.pin.risk{background:#fde7ee;color:#d23f6a;}.pin.news{background:#e8f1ff;color:#2f6df0;}
.pin .pinhint{font-weight:400;font-size:11px;color:#8a929c;margin-left:7px;}
.pli{font-size:12.5px;line-height:1.7;color:#3a4150;margin:3px 0 3px 2px;}
.plintro{font-size:12px;color:#8a929c;margin:3px 0;}
.rep.proc{background:#fafafa;border-left-color:#c9ced6;}
.tl{position:relative;padding-left:18px;margin-top:6px;}
.tl:before{content:"";position:absolute;left:4px;top:5px;bottom:5px;width:2px;background:var(--line);}
.tli{position:relative;margin-bottom:13px;}.tli:last-child{margin-bottom:2px;}
.tldot{position:absolute;left:-18px;top:3px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg);box-sizing:border-box;}
.tld{font-size:12.5px;font-weight:600;}.tlrest{font-weight:400;color:#8a929c;}
.tlt{font-size:12.5px;color:#3a4150;margin-top:1px;line-height:1.55;}
.geo{display:flex;align-items:center;gap:9px;padding:7px 2px;border-top:1px solid var(--line);font-size:12.5px;}
.geo:first-of-type{border-top:none;}
.gem{font-weight:600;color:#566;min-width:38px;}
.gedot{width:9px;height:9px;border-radius:50%;flex:none;}
.gen{font-weight:600;}.get{color:#3a4150;}
.gempty{font-size:12px;color:#8a929c;line-height:1.6;padding:4px 2px;}
.rep{border:1px solid #e6e2f5;border-left:4px solid #b9a6ef;border-radius:9px;padding:9px 11px;margin:11px 0;background:#fcfbff;font-size:12.5px;line-height:1.6;}
.glossary{margin-top:12px;background:#f6f4ff;border-radius:9px;padding:5px 11px 8px;}.glossary>summary{color:#5b3fd0;font-weight:600;}
.rep .rt{font-weight:700;color:var(--ink);}
.rep .stale{color:#c4581a;font-size:10px;font-weight:600;background:#fff3e6;border-radius:5px;padding:1px 5px;white-space:nowrap;}
.rep .concl{color:#222;margin:3px 0;background:#fbfbe9;border-radius:6px;padding:5px 8px;}
.rep .bki{color:#4a5160;margin:4px 0 4px 2px;line-height:1.55;}.rep .bki b{color:var(--ink);}
.rep .more{margin:5px 0 3px;}
.rep .more summary{font-size:11.5px;color:#7b4fe0;cursor:pointer;list-style:none;}
.rep .more summary::-webkit-details-marker{display:none;}
.rep .more summary::before{content:'▸ ';}
.rep .more[open] summary{margin-bottom:3px;}.rep .more[open] summary::before{content:'▾ ';}
.rep .kd{margin-top:6px;font-size:11.5px;color:#2c3e50;background:#eef6ff;border-radius:6px;padding:6px 8px;line-height:1.5;}
.rep .lite{color:#555;margin:3px 0;}.rep .lite .note{color:#aab0b8;font-size:11px;}
.rep a{font-size:11.5px;color:#2f6df0;text-decoration:none;display:inline-block;margin-top:4px;}
.pic{margin-top:13px;font-size:13px;color:#2c3340;background:#eef1f6;border-radius:9px;padding:9px 11px;line-height:1.6;}.pic b{color:var(--ink);}
.disc{font-size:11px;color:#9aa0a8;text-align:center;padding:6px 20px 30px;line-height:1.6;}
.empty{grid-column:1/-1;text-align:center;color:var(--sub);padding:40px 0;}
.rep .klab{font-size:11.5px;font-weight:700;color:#2c3e50;margin:7px 0 4px;}
.kdt{width:100%;border-collapse:collapse;font-size:11.5px;background:#f4f9ff;border-radius:6px;overflow:hidden;}
.kdt td{padding:5px 8px;border-bottom:1px solid #e3eefb;vertical-align:top;}.kdt tr:last-child td{border-bottom:none;}
.kdt .kdk{color:#5a6573;width:42%;}.kdt .kdv{color:#1d2330;font-weight:600;}
.kdt .up{color:var(--up);}.kdt .dn{color:var(--down);}
.rep .terms{margin-top:8px;background:#f6f4ff;border-radius:8px;padding:7px 9px;}
.rep .ti{font-size:11.5px;color:#3a4150;line-height:1.6;margin:4px 0;}.rep .ti b{color:#5b3fd0;}.rep .tsrc{font-size:10px;color:#aab0b8;margin-left:3px;}
.zoom{font-size:11px;color:#2f6df0;background:#eef4ff;border:none;border-radius:12px;padding:3px 10px;cursor:pointer;margin-top:7px;}
.modal{display:none;position:fixed;inset:0;background:rgba(20,25,40,.55);z-index:50;overflow:auto;padding:0;}
.modal-card{max-width:780px;margin:0 auto;background:var(--bg);border-radius:0;position:relative;padding:12px 12px 44px;min-height:100%;box-sizing:border-box;}
.mclose{position:fixed;top:12px;right:12px;width:40px;height:40px;padding:0;border-radius:50%;background:rgba(20,25,40,.62);color:#fff;border:none;font-size:20px;line-height:40px;text-align:center;cursor:pointer;z-index:60;box-shadow:0 2px 10px rgba(0,0,0,.35);}
.zoomwrap{font-size:15px;padding:2px;}.zoomwrap .zoom{display:none;}.zoomwrap .card{box-shadow:none;}
.zoomwrap .name{font-size:23px;}.zoomwrap .pct{font-size:28px;}.zoomwrap .sh{font-size:16px;}
.zoomwrap .kv,.zoomwrap .synth,.zoomwrap .hot,.zoomwrap .verdict,.zoomwrap .pic,.zoomwrap .bki,.zoomwrap .concl,.zoomwrap .lite,.zoomwrap .ti,.zoomwrap .kdt,.zoomwrap .ev{font-size:15px;line-height:1.85;}
.zoomwrap .pill,.zoomwrap .badge,.zoomwrap .si,.zoomwrap .klab,.zoomwrap .tsrc{font-size:13px;}
.tabs{display:flex;background:#eef0f4;border-radius:11px;padding:3px;margin:10px 0 2px;}
.tab{flex:1;text-align:center;padding:8px 0;font-size:14px;font-weight:600;color:var(--sub);border-radius:9px;cursor:pointer;}
.tab.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(20,30,60,.12);}
.tabhint{font-size:11px;color:var(--sub);padding:7px 2px 0;}
.pre{background:#fff8ee;border:1px solid #ffe6c2;border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.7;color:#5a4a32;margin-top:8px;}
.pre .it{margin:4px 0;}.pre b{color:#7a5a1a;}
.pre a,.ent a{color:#2f6df0;text-decoration:none;}
#prebanner{padding:0 12px;}
.gbanner{background:linear-gradient(180deg,#fff6ec,#fffdfa);border:1px solid #ffe0bd;border-radius:12px;padding:11px 13px;margin-bottom:4px;}
.gh{font-size:13px;font-weight:700;color:#b8600f;}.gby{font-size:10px;color:#b9a06a;font-weight:400;margin-left:7px;}
.gchips{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0;}
.gchip{font-size:12px;border-radius:7px;padding:3px 9px;background:#f1f3f7;color:#566;font-weight:600;}
.gchip.up{background:#fdeceb;color:var(--up);}.gchip.down{background:#e9f6ef;color:var(--down);}
.gsum{font-size:12.5px;color:#5a4a32;line-height:1.6;}
.prenote{font-size:11px;color:#9097a0;line-height:1.6;padding:4px 4px 2px;}.prenote b{color:#6b7280;}
.pre .warn{color:#9a7b3a;font-size:11px;margin-top:5px;border-top:1px dashed #ecd9b5;padding-top:5px;}
.empty2{color:var(--sub);font-size:12.5px;padding:16px 8px;text-align:center;background:#f7f8fa;border-radius:9px;margin-top:8px;line-height:1.7;}
.pblk{font-size:12.5px;line-height:1.65;color:#3a4150;margin:8px 0;}.pblk .lab{font-weight:700;color:#b8600f;}
.pblk.core{background:#fff8ee;border:1px solid #ffe6c2;border-radius:9px;padding:9px 11px;}.pblk.core b{color:#7a5a1a;}
.tl{position:relative;margin-top:8px;padding-left:14px;}
.tl:before{content:'';position:absolute;left:3px;top:4px;bottom:4px;width:2px;background:#e3e6ee;}
.ent{position:relative;margin-bottom:13px;}
.ent:before{content:'';position:absolute;left:-14px;top:3px;width:9px;height:9px;border-radius:50%;background:#2f6df0;border:2px solid #fff;}
.ent.today:before{background:var(--up);}
.ent .date{font-size:12.5px;font-weight:700;color:var(--ink);}
.ent .date .new{font-size:10px;color:#fff;background:var(--up);border-radius:8px;padding:1px 6px;margin-left:6px;}
.ent .li{font-size:12px;line-height:1.6;color:#3a4150;margin:3px 0;}
.ent .li .k{display:inline-block;min-width:54px;color:var(--sub);vertical-align:top;}
.ent .up{color:var(--up);font-weight:600;}.ent .down{color:var(--down);font-weight:600;}
.pdtl{display:block;margin:4px 0 4px 12px;}
.pdtl>summary{cursor:pointer;list-style:none;color:#2c3550;line-height:1.55;}
.pdtl>summary::-webkit-details-marker{display:none;}
.pdtl>summary::before{content:'▸ ';color:#2f6df0;font-weight:700;}
.pdtl[open]>summary::before{content:'▾ ';}
.pdtl .pdbody{margin:5px 0 2px 12px;padding:7px 9px;background:#f7f9fc;border-radius:7px;border-left:3px solid #cfe0fb;}
.pdtl .pbki{color:#4a5160;margin:4px 0;line-height:1.55;}.pdtl .pbki b{color:var(--ink);}
.pdtl .pdbody a{color:#2f6df0;text-decoration:none;display:inline-block;margin-top:4px;font-size:11.5px;}
.ent .pfin{font-size:11.5px;color:#159a57;background:#eafaf1;border-radius:6px;padding:4px 8px;margin:4px 0 4px 12px;}
</style></head><body>
<header>
  <div class="h-title">📊 自选股信息速览表</div>
  <div class="h-sub">预览v26 · 共 <span id="cnt">5</span> 只 · 实时异动走飞书消息</div>
  <div class="tabs" id="tabs"><div class="tab on" data-t="yanjiu">🔬 研究</div><div class="tab" data-t="pre">🌅 盘前</div><div class="tab" data-t="post">🌆 盘后</div></div>
  <div class="tabhint" id="tabhint">研究=这只股票的深度档案(公司速览/综合分析/研报精读),慢变、不被每日流水冲掉。</div>
  <div class="toolbar">
    <input class="search" id="q" placeholder="搜名称或代码…">
    <select id="sort"><option value="pct">按今日涨跌</option><option value="risk">风险优先</option></select>
  </div>
</header>
<div class="chips" id="chips">
  <div class="chip on" data-f="all">全部</div>
  <div class="chip" data-f="up">🔴 上涨</div><div class="chip" data-f="down">🟢 下跌</div>
  <div class="chip" data-f="news">📢 有动静</div><div class="chip" data-f="risk">⚠️ 有风险</div>
</div>
<div class="legend">📌 这是你自选股的【公开信息 · 人话速览】——把研报 / 公告 / 公司背景收拢成一页,说人话、不编。<b>只做信息整理,不荐股、不预测涨跌,买卖你自己判断。</b>卡片上沿 红涨绿跌;「近期关注点」找不到就写"未找到明确驱动"。</div>
<div id="prebanner"></div>
<main id="grid"></main>
<div class="disc">⚠️ 仅供研究参考,不构成任何买卖建议,投资决策请自行判断。数据来自公开行情/研报。</div>
<div id="modal" class="modal" onclick="if(event.target===this)closeZoom()"><div class="modal-card"><button class="mclose" onclick="closeZoom()" aria-label="关闭">✕</button><div class="zoomwrap" id="zoomwrap"></div></div></div>
<script>
const DIM=["基本面","资金","估值","成长","技术","催化","情绪","风险"];
// 每个维度的 高/中/低 翻译成本维度的人话(蓝=对它有利,橙=不利,灰=一般)。
// 大脑评级口径:高=对它越有利(估值"高"=便宜、风险"高"=风险小),这里统一翻成不用反着想的词。
const DIMWORD=[
 {"高":"扎实","中":"一般","低":"偏弱"},   // 基本面
 {"高":"流入","中":"中性","低":"流出"},   // 资金
 {"高":"偏便宜","中":"合理","低":"偏贵"}, // 估值
 {"高":"较快","中":"平稳","低":"放缓"},   // 成长
 {"高":"偏强","中":"震荡","低":"偏弱"},   // 技术
 {"高":"较多","中":"一般","低":"偏少"},   // 催化
 {"高":"偏乐观","中":"中性","低":"偏谨慎"},// 情绪
 {"高":"较低","中":"一般","低":"较高"}    // 风险(高=风险小→偏蓝,低=风险大→偏橙)
];

: "国产存储模组 + 封测第一梯队(与江波龙并列),非晶圆原厂", "posGlobal": "模组/封测环节有份额,核心颗粒受制于海外原厂", "bench": "看竞争格局用:国内江波龙;海外模组厂金士顿、威刚", "verdict": "它在存储链的“中下游模组/封测”,不掌握最核心的存储颗粒制造(那才是卡脖子,被三星/美光/海力士 + 长江存储掌握),所以不算卡脖子核心、也非数一数二。AI 对存储需求大(尤其 HBM 高带宽内存),但 HBM 是另一回事、佰维不做 HBM,主要受益消费/企业级存储的涨价周期。别把它和“AI 存储核心(HBM)”划等号。", "terms": [["存储颗粒", "真正“存数据的肉身”——NAND(闪存)/DRAM(内存)芯片;三星/美光/长江存储等原厂造,是全链最核心环节。"], ["模组", "把颗粒 + 主控攒成能插进设备的成品,如内存条、SSD、手机存储。"], ["封装测试(封测)", "把裸芯片封进外壳做成能用的成品、再测好坏;佰维有自己的封测产线。"], ["eMMC / UFS", "手机/平板里的“硬盘”——把闪存颗粒 + 主控封在一起的嵌入式存储,UFS 比 eMMC 更快更新。"], ["HBM", "高带宽内存,AI 显卡旁边那种超高速内存,被海外原厂垄断;佰维不做这个,别混。"]], "scene": "存储", "scene_name": "存储芯片产业链(①-⑥)", "role": "模组/封测", "peers": ["大普微-UW", "澜起科技"], "peer_board": "存储芯片"}}, {"name": "江丰电子", "code": "300666", "pct": 2.9, "price": 55.2, "mktTxt": "创业板", "profile": {"biz": "江丰电子做的是“溅射靶材”——造芯片时给硅片“喷镀金属”用的高纯金属原料,另外还做半导体设备的精密零部件。打个比方:芯片里那些细如发丝的金属“电线”,是一层层镀上去的,江丰卖的就是被镀上去的那块金属原料。", "chain": "在“造芯片用什么材料”这条链上,它在【④镀膜(PVD)环节】——给造好图形的硅片镀上金属导线。\n· 它做的“靶材”是这一步的核心耗材(每镀一层就消耗,反复用)。\n· 所有芯片(含AI芯片)都要镀金属、都离不开靶材,属于“卖铲子”的关键材料。", "makes": "④ 镀膜用的“靶材”(PVD溅射靶材:高纯铜/铝/钛/钽金属)", "prod": "①超高纯金属溅射靶材(纯度99.999%以上的铜/铝/钛/钽金属块,在芯片制造的镀膜环节被离子“打”成原子、镀到硅片上形成电路导线——造芯片必需的关键耗材);②半导体精密零部件(刻蚀机等设备里的腔体零件,第二增长曲线)。", "moat": "国内少数大规模打入台积电、中芯国际等先进制程供应链的靶材企业,纯度与良率达国际水平。", "posCN": "半导体靶材国产领先、第一梯队", "posGlobal": "★全球第二(2024年晶圆制造靶材市占率口径),份额持续扩大,部分进入7/14nm先进制程", "bench": "看竞争格局用:日本JX金属、美国霍尼韦尔Honeywell、日本东曹Tosoh(它是国产替代这几家的主力)", "verdict": "★真正的卡脖子环节 + 国产替代标杆。超高纯靶材此前几乎全靠进口,江丰实现突破、做到全球第二、并进入全球先进产线。所有芯片(含AI芯片)制造都要镀金属、离不开靶材,属于半导体材料里“卖铲子”的核心环节,战略意义大。(排名为2024年口径,会随时间变动)", "terms": [["靶材", "一块高纯金属原料(铜/铝/钛等),在镀膜时被离子打成原子、像喷漆一样镀到硅片上,形成芯片里的金属导线。"], ["溅射 / PVD", "PVD=物理气相沉积,说人话就是“物理喷镀金属”:拿离子去打那块靶材,把金属原子一颗颗轰出来、均匀沾到硅片上。"], ["硅片 / 晶圆", "芯片的“画布”,一块圆圆的高纯硅盘子,电路都刻在它上面。"], ["先进制程(7/14nm)", "芯片里线路的精细程度,数字越小越先进、越难做(台积电/中芯在拼这个)。"], ["精密零部件", "刻蚀机等芯片设备里的高精度金属腔体零件,也被海外垄断、江丰在国产替代。"]], "scene": "半导体材料", "scene_name": "一片硅片走过芯片产线(①-⑥)", "role": "靶材", "peers": ["西安奕材-U", "沪硅产业", "立昂微"], "peer_board": "半导体材料(靶材/硅片/石英/湿化学)"}}];
const BOARDS={"半导体材料": {"name": "一片硅片走过芯片产线(①-⑥)", "svg": "<svg viewBox=\"0 0 360 318\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" font-family=\"-apple-system,'PingFang SC','Microsoft YaHei',sans-serif\">\n<title>一片硅片在芯片产线上走过一台台机器(①-⑥)</title><desc>①硅片(西安奕材/沪硅/立昂微)进产线,依次经②光刻机涂胶留保护盖→③刻蚀机把没盖住的吃成沟槽→④镀膜机喷金属(用江丰靶材)→⑤抛光机磨平,②-⑤重复几十层,⑥切割封测成芯片。光刻胶=保护盖:盖住的留下、没盖住的被刻掉。这4只做的是材料(硅片+靶材)不是机器。</desc>\n<defs>\n<marker id=\"arf\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#aab4c2\"/></marker>\n<marker id=\"are\" markerWidth=\"6\" markerHeight=\"6\" refX=\"4\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L4,3 L0,6 Z\" fill=\"#79bfc6\"/></marker>\n<marker id=\"arl\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#d6b06a\"/></marker>\n</defs>\n<rect x=\"0\" y=\"0\" width=\"360\" height=\"318\" rx=\"14\" fill=\"#fafdff\"/>\n<text x=\"16\" y=\"22\" font-size=\"12.5\" font-weight=\"700\" fill=\"#1d2433\">🏭 一片硅片走过芯片工厂的产线</text>\n<!-- 循环箭头 -->\n<path d=\"M252,50 C246,38 110,38 100,50\" fill=\"none\" stroke=\"#d6b06a\" stroke-width=\"1.2\" stroke-dasharray=\"4 3\" marker-end=\"url(#arl)\"/>\n<text x=\"176\" y=\"35\" font-size=\"8\" font-weight=\"700\" fill=\"#b07d3a\" text-anchor=\"middle\">↺ ②③④⑤ 重复几十层</text>\n<!-- ① 硅片进场 -->\n<circle cx=\"36\" cy=\"112\" r=\"13\" fill=\"#f3dd9b\" stroke=\"#cba94e\" stroke-width=\"1.4\"/><line x1=\"28\" y1=\"120\" x2=\"34\" y2=\"114\" stroke=\"#cba94e\" stroke-width=\"1.2\"/>\n<circle cx=\"24\" cy=\"101\" r=\"7.5\" fill=\"#74a9e0\"/><text x=\"24\" y=\"104.5\" font-size=\"9.5\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<text x=\"36\" y=\"141\" font-size=\"8\" font-weight=\"700\" fill=\"#8a6d24\" text-anchor=\"middle\">硅片</text>\n<line x1=\"50\" y1=\"112\" x2=\"70\" y2=\"112\" stroke=\"#aab4c2\" stroke-width=\"1.3\" marker-end=\"url(#arf)\"/>\n<!-- 传送带 -->\n<line x1=\"74\" y1=\"130\" x2=\"286\" y2=\"130\" stroke=\"#cbd2dc\" stroke-width=\"2\"/>\n<!-- ② 光刻机 -->\n<rect x=\"74\" y=\"54\" width=\"44\" height=\"38\" rx=\"3\" fill=\"#eef1f4\" stroke=\"#c5ccd6\"/>\n<rect x=\"81\" y=\"59\" width=\"30\" height=\"7\" rx=\"2\" fill=\"#dde3ea\"/>\n<circle cx=\"74\" cy=\"54\" r=\"7.5\" fill=\"#a187dc\"/><text x=\"74\" y=\"57.5\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">2</text>\n<text x=\"96\" y=\"83\" font-size=\"8.5\" font-weight=\"700\" fill=\"#6b4fb0\" text-anchor=\"middle\">光刻机</text>\n<rect x=\"80\" y=\"100\" width=\"32\" height=\"3\" fill=\"#c4b6e6\"/>\n<line x1=\"86\" y1=\"95\" x2=\"86\" y2=\"111\" stroke=\"#d9c2ea\" stroke-width=\"1.2\"/><line x1=\"96\" y1=\"95\" x2=\"96\" y2=\"111\" stroke=\"#d9c2ea\" stroke-width=\"1.2\"/><line x1=\"106\" y1=\"95\" x2=\"106\" y2=\"111\" stroke=\"#d9c2ea\" stroke-width=\"1.2\"/>\n<rect x=\"74\" y=\"123\" width=\"44\" height=\"6\" fill=\"#c2cdd9\"/>\n<rect x=\"79\" y=\"117\" width=\"9\" height=\"6\" fill=\"#e3a9cb\"/><rect x=\"92\" y=\"117\" width=\"9\" height=\"6\" fill=\"#e3a9cb\"/><rect x=\"105\" y=\"117\" width=\"9\" height=\"6\" fill=\"#e3a9cb\"/>\n<text x=\"96\" y=\"141\" font-size=\"7.5\" font-weight=\"700\" fill=\"#b5638f\" text-anchor=\"middle\">盖光刻胶</text>\n<!-- ③ 刻蚀机 -->\n<rect x=\"128\" y=\"54\" width=\"44\" height=\"38\" rx=\"3\" fill=\"#eef1f4\" stroke=\"#c5ccd6\"/>\n<rect x=\"135\" y=\"59\" width=\"30\" height=\"7\" rx=\"2\" fill=\"#dde3ea\"/>\n<circle cx=\"128\" cy=\"54\" r=\"7.5\" fill=\"#56b7c1\"/><text x=\"128\" y=\"57.5\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<text x=\"150\" y=\"83\" font-size=\"8.5\" font-weight=\"700\" fill=\"#2f7a82\" text-anchor=\"middle\">刻蚀机</text>\n<line x1=\"140\" y1=\"97\" x2=\"140\" y2=\"110\" stroke=\"#79bfc6\" stroke-width=\"1.2\" marker-end=\"url(#are)\"/><line x1=\"150\" y1=\"97\" x2=\"150\" y2=\"110\" stroke=\"#79bfc6\" stroke-width=\"1.2\" marker-end=\"url(#are)\"/><line x1=\"160\" y1=\"97\" x2=\"160\" y2=\"110\" stroke=\"#79bfc6\" stroke-width=\"1.2\" marker-end=\"url(#are)\"/>\n<rect x=\"128\" y=\"123\" width=\"44\" height=\"6\" fill=\"#c2cdd9\"/>\n<rect x=\"132\" y=\"115\" width=\"9\" height=\"8\" fill=\"#c2cdd9\"/><rect x=\"146\" y=\"115\" width=\"9\" height=\"8\" fill=\"#c2cdd9\"/><rect x=\"160\" y=\"115\" width=\"9\" height=\"8\" fill=\"#c2cdd9\"/>\n<rect x=\"132\" y=\"111\" width=\"9\" height=\"4\" fill=\"#e3a9cb\"/><rect x=\"146\" y=\"111\" width=\"9\" height=\"4\" fill=\"#e3a9cb\"/><rect x=\"160\" y=\"111\" width=\"9\" height=\"4\" fill=\"#e3a9cb\"/>\n<text x=\"150\" y=\"141\" font-size=\"7.5\" font-weight=\"700\" fill=\"#2f7a82\" text-anchor=\"middle\">刻出沟槽</text>\n<!-- ④ 镀膜机:顶上装靶材 -->\n<rect x=\"192\" y=\"46\" width=\"24\" height=\"8\" rx=\"1\" fill=\"#f3dd9b\" stroke=\"#cba94e\"/>\n<rect x=\"182\" y=\"54\" width=\"44\" height=\"38\" rx=\"3\" fill=\"#eef1f4\" stroke=\"#c5ccd6\"/>\n<rect x=\"189\" y=\"59\" width=\"30\" height=\"7\" rx=\"2\" fill=\"#dde3ea\"/>\n<circle cx=\"182\" cy=\"54\" r=\"7.5\" fill=\"#d6a45a\"/><text x=\"182\" y=\"57.5\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">4</text>\n<text x=\"204\" y=\"83\" font-size=\"8.5\" font-weight=\"700\" fill=\"#b07d3a\" text-anchor=\"middle\">镀膜机</text>\n<circle cx=\"194\" cy=\"98\" r=\"1.6\" fill=\"#cba85e\"/><circle cx=\"202\" cy=\"106\" r=\"1.6\" fill=\"#cba85e\"/><circle cx=\"210\" cy=\"98\" r=\"1.6\" fill=\"#cba85e\"/><circle cx=\"198\" cy=\"112\" r=\"1.6\" fill=\"#cba85e\"/><circle cx=\"214\" cy=\"110\" r=\"1.6\" fill=\"#cba85e\"/><circle cx=\"206\" cy=\"95\" r=\"1.6\" fill=\"#cba85e\"/>\n<rect x=\"182\" y=\"123\" width=\"44\" height=\"6\" fill=\"#c2cdd9\"/>\n<rect x=\"182\" y=\"116\" width=\"44\" height=\"7\" fill=\"#cba85e\"/>\n<text x=\"204\" y=\"141\" font-size=\"7.5\" font-weight=\"700\" fill=\"#b07d3a\" text-anchor=\"middle\">填金属</text>\n<!-- ⑤ 抛光机:磨平 -->\n<rect x=\"236\" y=\"54\" width=\"44\" height=\"38\" rx=\"3\" fill=\"#eef1f4\" stroke=\"#c5ccd6\"/>\n<rect x=\"243\" y=\"59\" width=\"30\" height=\"7\" rx=\"2\" fill=\"#dde3ea\"/>\n<circle cx=\"236\" cy=\"54\" r=\"7.5\" fill=\"#62bd90\"/><text x=\"236\" y=\"57.5\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">5</text>\n<text x=\"258\" y=\"83\" font-size=\"8.5\" font-weight=\"700\" fill=\"#2f7d56\" text-anchor=\"middle\">抛光机</text>\n<rect x=\"240\" y=\"106\" width=\"36\" height=\"6\" rx=\"3\" fill=\"#aab4c2\"/><line x1=\"246\" y1=\"102\" x2=\"252\" y2=\"102\" stroke=\"#9aa1ac\" stroke-width=\"1\"/><line x1=\"264\" y1=\"102\" x2=\"270\" y2=\"102\" stroke=\"#9aa1ac\" stroke-width=\"1\"/>\n<rect x=\"236\" y=\"123\" width=\"44\" height=\"6\" fill=\"#c2cdd9\"/>\n<rect x=\"236\" y=\"119\" width=\"44\" height=\"4\" fill=\"#cba85e\"/><line x1=\"242\" y1=\"120.5\" x2=\"272\" y2=\"120.5\" stroke=\"#f0e3c0\" stroke-width=\"1\"/>\n<text x=\"258\" y=\"141\" font-size=\"7.5\" font-weight=\"700\" fill=\"#2f7d56\" text-anchor=\"middle\">磨平</text>\n<!-- ⑥ 切割封测→芯片 -->\n<line x1=\"286\" y1=\"123\" x2=\"298\" y2=\"118\" stroke=\"#aab4c2\" stroke-width=\"1.3\" marker-end=\"url(#arf)\"/>\n<circle cx=\"300\" cy=\"101\" r=\"7.5\" fill=\"#516079\"/><text x=\"300\" y=\"104.5\" font-size=\"9.5\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">6</text>\n<rect x=\"304\" y=\"108\" width=\"10\" height=\"10\" rx=\"1\" fill=\"#c2cdd9\" stroke=\"#9fb4d4\"/><rect x=\"317\" y=\"108\" width=\"10\" height=\"10\" rx=\"1\" fill=\"#c2cdd9\" stroke=\"#9fb4d4\"/><rect x=\"310\" y=\"120\" width=\"10\" height=\"9\" rx=\"1\" fill=\"#c2cdd9\" stroke=\"#9fb4d4\"/>\n<text x=\"316\" y=\"141\" font-size=\"7.5\" fill=\"#516079\" text-anchor=\"middle\">芯片</text>\n<!-- 逻辑说明条 -->\n<rect x=\"14\" y=\"150\" width=\"332\" height=\"24\" rx=\"7\" fill=\"#fff7ec\" stroke=\"#f0d9b0\"/>\n<text x=\"180\" y=\"166\" font-size=\"8.5\" font-weight=\"700\" fill=\"#b07d3a\" text-anchor=\"middle\">💡 光刻胶=“保护盖”:盖住的留下、没盖住的被刻掉,图案就这么刻出来</text>\n<!-- 底部文字 -->\n<text x=\"16\" y=\"190\" font-size=\"9\" font-weight=\"700\" fill=\"#8a6d24\">① 硅片〔🟡〕:芯片的“画布”,所有电路都刻在它上面</text>\n<text x=\"16\" y=\"208\" font-size=\"9\" fill=\"#6b4fb0\">② 光刻机:涂满光刻胶 → 透过掩膜板曝光 → 留下“保护盖”图案(粉色)</text>\n<text x=\"16\" y=\"226\" font-size=\"9\" fill=\"#2f7a82\">③ 刻蚀机:没被胶盖住的地方被“吃掉”、凹成沟槽(刻完再洗掉胶)</text>\n<text x=\"16\" y=\"244\" font-size=\"9\" font-weight=\"700\" fill=\"#b07d3a\">④ 镀膜机:往沟槽喷金属做导线——用🟡靶材,打成原子喷上去</text>\n<text x=\"16\" y=\"262\" font-size=\"9\" fill=\"#2f7d56\">⑤ 抛光机(CMP):磨平表面好叠下一层　(↺ ②-⑤重复几十层)</text>\n<text x=\"16\" y=\"280\" font-size=\"9\" fill=\"#516079\">⑥ 切割封测:把硅片切成小芯片、装壳,就是成品芯片</text>\n<text x=\"16\" y=\"300\" font-size=\"9\" font-weight=\"700\" fill=\"#b05757\">🟡 黄色=你持仓做的环(具体哪只看卡片):是“材料”、不是机器;高端被日美垄断</text>\n</svg>", "flow": "把芯片工厂想成一条产线:一片硅片从左边进去,在一台台机器下面被反复加工,最后右边出来变成芯片。你的自选股做的是喂给产线的“材料”,不是机器(具体哪只做哪环,看卡片):\n① 硅片〔🟡你持仓做这环〕:芯片的“画布”——一块圆圆的高纯硅盘子,所有电路都刻在它上面(12英寸大硅片最金贵、最卡脖子)。\n② 光刻机:用光透过一张“掩膜板”(镂空模板),像照相一样把电路图“印”到硅片上,印出一层光刻胶图案。\n③ 刻蚀机:把没被光刻胶盖住的地方“雕”掉,在硅片上留下一道道沟槽。\n④ 镀膜机(PVD):往沟槽里“喷”金属做导线——机器上装着靶材〔🟡你持仓做这环〕,靶材被离子打成一颗颗金属原子、像下雨一样镀到硅片上。\n⑤ CMP 抛光:把表面磨平,好接着叠下一层。—— ②③④⑤ 这几步反复几十上百遍,层层叠出一颗芯片 ——\n⑥ 切割封测:把整片硅片切成一颗颗小芯片、装上外壳、体检合格出厂,就是成品芯片。\n🟡 记住:你的自选股在这条链做的是“材料”(硅片是画布、靶材是金属原料),不是造机器的——别误当设备股。⚠️ 12英寸大硅片、高纯靶材长期被日本(信越/SUMCO)、美日企业垄断,国产替代空间大但最高端仍在追;靶材的国产龙头排全球第二、不是第一。"}, "存储": {"name": "存储芯片产业链(①-⑥)", "svg": "<svg viewBox=\"0 0 360 232\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" font-family=\"-apple-system,'PingFang SC','Microsoft YaHei',sans-serif\">\n<title>一条内存条怎么做成、里面有什么(①-⑥)</title><desc>①裸颗粒经④封测⑤模组做成内存条(板上有颗粒②主控③接口),再插进⑥电脑或AI服务器。颗粒最核心、三星长江存储造,这几只都不造。</desc>\n<defs><marker id=\"arm\" markerWidth=\"8\" markerHeight=\"8\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#aab4c2\"/></marker></defs>\n<rect x=\"0\" y=\"0\" width=\"360\" height=\"232\" rx=\"14\" fill=\"#fafdff\"/>\n<text x=\"16\" y=\"22\" font-size=\"12.5\" font-weight=\"700\" fill=\"#33405a\">💾 一条内存条 = 3 个零件,经 2 道加工做成</text>\n<!-- 第一步:3个零件 ①②③ -->\n<text x=\"14\" y=\"40\" font-size=\"9\" font-weight=\"700\" fill=\"#6b7790\">① 先有 3 个零件</text>\n<rect x=\"14\" y=\"48\" width=\"50\" height=\"32\" rx=\"5\" fill=\"#e9edf5\" stroke=\"#aab9d2\"/><text x=\"39\" y=\"68\" font-size=\"10\" font-weight=\"700\" fill=\"#45577a\" text-anchor=\"middle\">颗粒</text>\n<circle cx=\"14\" cy=\"48\" r=\"8.5\" fill=\"#8096b9\"/><text x=\"14\" y=\"52\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<rect x=\"68\" y=\"48\" width=\"50\" height=\"32\" rx=\"5\" fill=\"#efe9f3\" stroke=\"#c4b1cc\"/><text x=\"93\" y=\"68\" font-size=\"10\" font-weight=\"700\" fill=\"#6a5176\" text-anchor=\"middle\">主控</text>\n<circle cx=\"68\" cy=\"48\" r=\"8.5\" fill=\"#a98cb5\"/><text x=\"68\" y=\"52\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">2</text>\n<rect x=\"122\" y=\"48\" width=\"56\" height=\"32\" rx=\"5\" fill=\"#e4eff0\" stroke=\"#a6c9cc\"/><text x=\"150\" y=\"68\" font-size=\"10\" font-weight=\"700\" fill=\"#3d7077\" text-anchor=\"middle\">接口</text>\n<circle cx=\"122\" cy=\"48\" r=\"8.5\" fill=\"#5fa1a8\"/><text x=\"122\" y=\"52\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<!-- 第二步:两道加工 ④⑤ -->\n<line x1=\"178\" y1=\"64\" x2=\"194\" y2=\"64\" stroke=\"#b8c0cc\" stroke-width=\"2\" marker-end=\"url(#arm)\"/>\n<rect x=\"194\" y=\"48\" width=\"92\" height=\"32\" rx=\"8\" fill=\"#f4ece0\" stroke=\"#d9c6a6\" stroke-dasharray=\"5 3\"/><text x=\"240\" y=\"62\" font-size=\"8.5\" font-weight=\"700\" fill=\"#927549\" text-anchor=\"middle\">⚙ 封测 → 模组</text><text x=\"240\" y=\"73\" font-size=\"7\" fill=\"#a98f63\" text-anchor=\"middle\">(两道加工)</text>\n<circle cx=\"194\" cy=\"48\" r=\"8.5\" fill=\"#c3a675\"/><text x=\"194\" y=\"52\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">4</text>\n<circle cx=\"286\" cy=\"48\" r=\"8.5\" fill=\"#c3a675\"/><text x=\"286\" y=\"52\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">5</text>\n<line x1=\"240\" y1=\"80\" x2=\"240\" y2=\"96\" stroke=\"#b8c0cc\" stroke-width=\"2\" marker-end=\"url(#arm)\"/>\n<!-- 第三步:做成一整条内存条 -->\n<text x=\"14\" y=\"100\" font-size=\"9\" font-weight=\"700\" fill=\"#4a8268\">→ 做成一整条内存条(= ①②③ 装好的):</text>\n<rect x=\"14\" y=\"104\" width=\"240\" height=\"62\" rx=\"6\" fill=\"#5f9e7d\" stroke=\"#4a8268\" stroke-width=\"1.5\"/>\n<rect x=\"22\" y=\"116\" width=\"42\" height=\"38\" rx=\"3\" fill=\"#39434f\"/><text x=\"43\" y=\"137\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">颗粒</text><text x=\"43\" y=\"147\" font-size=\"6.5\" fill=\"#b6bfca\" text-anchor=\"middle\">存数据</text>\n<rect x=\"70\" y=\"116\" width=\"46\" height=\"38\" rx=\"3\" fill=\"#39434f\"/><text x=\"93\" y=\"137\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">主控</text><text x=\"93\" y=\"147\" font-size=\"6.5\" fill=\"#b6bfca\" text-anchor=\"middle\">管理员</text>\n<rect x=\"122\" y=\"116\" width=\"78\" height=\"38\" rx=\"3\" fill=\"#39434f\"/><text x=\"161\" y=\"137\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">接口芯片</text><text x=\"161\" y=\"147\" font-size=\"6.5\" fill=\"#b6bfca\" text-anchor=\"middle\">收费站</text>\n<g fill=\"#cbb083\"><rect x=\"22\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"42\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"62\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"82\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"102\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"122\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"142\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"162\" y=\"158\" width=\"12\" height=\"5\"/><rect x=\"182\" y=\"158\" width=\"12\" height=\"5\"/></g>\n<line x1=\"254\" y1=\"135\" x2=\"270\" y2=\"135\" stroke=\"#b8c0cc\" stroke-width=\"2\" marker-end=\"url(#arm)\"/>\n<rect x=\"272\" y=\"110\" width=\"74\" height=\"54\" rx=\"7\" fill=\"#edf0f5\" stroke=\"#b1bccd\"/><rect x=\"272\" y=\"128\" width=\"7\" height=\"18\" rx=\"1\" fill=\"#d4dce8\"/>\n<text x=\"312\" y=\"134\" font-size=\"9\" font-weight=\"700\" fill=\"#4a5568\" text-anchor=\"middle\">电脑/</text><text x=\"312\" y=\"147\" font-size=\"9\" font-weight=\"700\" fill=\"#4a5568\" text-anchor=\"middle\">AI服务器</text>\n<circle cx=\"272\" cy=\"110\" r=\"8.5\" fill=\"#8096b9\"/><text x=\"272\" y=\"114\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">6</text>\n<!-- 文字说明 -->\n<text x=\"16\" y=\"186\" font-size=\"9.5\" font-weight=\"700\" fill=\"#9c6a6a\">★① 颗粒 = 存数据的“仓库”,三星/长江存储造 —— 你的自选股都不造、得买它</text>\n<text x=\"16\" y=\"204\" font-size=\"9.5\" fill=\"#5a6b7b\">② 主控 = “管理员”(决定怎么存)　③ 接口 = CPU↔内存的“收费站”</text>\n<text x=\"16\" y=\"222\" font-size=\"9.5\" fill=\"#5a6b7b\">④ 封测 = 把零件封成成品芯片　⑤ 模组 = 贴到板上攒成 → ⑥ 插进电脑用</text>\n</svg>", "flow": "把数据存进存储芯片,像“把字写进一个铁笔记本”,这条链分 6 环:\n① 存储颗粒·原厂:真正“存数据的肉身”——一片片晶圆造出 NAND(闪存)、DRAM(内存)颗粒,数据最后就存在它里面。★这是全链最核心、最卡脖子的一环(三星/海力士/美光、国产长江存储/长鑫造);⚠️ 注意:你的自选股都不造颗粒、得向原厂买。\n② 主控芯片:存储的“仓库管理员”——决定数据存哪、怎么纠错不丢、跑多快;SSD 性能好不好主要看它。\n③ 接口芯片:CPU 和内存条之间的“高速收费站”——只管让数据跑得又快又稳、不出错(DDR5 时代必备)。\n④ 封装测试:把裸颗粒“封”进外壳、做成能用的成品芯片,再体检挑出好坏。\n⑤ 模组/成品:把颗粒+主控攒成内存条、SSD、手机存储(UFS)这些能插进设备的成品。\n⑥ 终端:手机、电脑、AI 服务器——最终用存储的地方,AI 服务器对高速存储最饥渴。"}, "网络芯片": {"name": "掀开交换机看里面的电路板(①-③)", "svg": "<svg viewBox=\"0 0 360 296\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" font-family=\"-apple-system,'PingFang SC','Microsoft YaHei',sans-serif\">\n<title>掀开一台交换机看里面的电路板(①-③)</title><desc>俯视一块交换机电路板:前面板网口→①PHY物理层(裕太微)→②MAC虚线集成→③中央交换ASIC(盛科);灰色CPU/内存/供电是配角。PHY管信号通不通、ASIC管数据往哪走。</desc>\n<defs><marker id=\"arn\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#b6cabc\"/></marker></defs>\n<rect x=\"0\" y=\"0\" width=\"360\" height=\"296\" rx=\"14\" fill=\"#fafdff\"/>\n<text x=\"16\" y=\"22\" font-size=\"12.5\" font-weight=\"700\" fill=\"#1d2433\">🔌 掀开一台交换机,看里面的电路板</text>\n<!-- 外壳(整机) -->\n<rect x=\"14\" y=\"34\" width=\"332\" height=\"150\" rx=\"10\" fill=\"#eef1f4\" stroke=\"#c5ccd6\"/>\n<text x=\"24\" y=\"48\" font-size=\"8.5\" fill=\"#97a1b1\">交换机掀盖 · 从上往下看这块板</text>\n<!-- 绿电路板 -->\n<rect x=\"22\" y=\"56\" width=\"312\" height=\"120\" rx=\"6\" fill=\"#e7f0ea\" stroke=\"#93bca5\"/>\n<line x1=\"34\" y1=\"61\" x2=\"320\" y2=\"61\" stroke=\"#d3e6da\" stroke-width=\"1\"/>\n<line x1=\"34\" y1=\"171\" x2=\"214\" y2=\"171\" stroke=\"#d3e6da\" stroke-width=\"1\"/>\n<!-- 前面板:网口/光口 -->\n<rect x=\"30\" y=\"66\" width=\"20\" height=\"14\" rx=\"2\" fill=\"#39434f\"/><rect x=\"33\" y=\"71\" width=\"14\" height=\"3\" rx=\"1\" fill=\"#707e8d\"/>\n<rect x=\"30\" y=\"88\" width=\"20\" height=\"14\" rx=\"2\" fill=\"#39434f\"/><rect x=\"33\" y=\"93\" width=\"14\" height=\"3\" rx=\"1\" fill=\"#707e8d\"/>\n<rect x=\"30\" y=\"110\" width=\"20\" height=\"14\" rx=\"2\" fill=\"#39434f\"/><rect x=\"33\" y=\"115\" width=\"14\" height=\"3\" rx=\"1\" fill=\"#707e8d\"/>\n<rect x=\"30\" y=\"132\" width=\"20\" height=\"14\" rx=\"2\" fill=\"#39434f\"/><rect x=\"33\" y=\"137\" width=\"14\" height=\"3\" rx=\"1\" fill=\"#707e8d\"/>\n<text x=\"40\" y=\"166\" font-size=\"8\" font-weight=\"700\" fill=\"#5f7180\" text-anchor=\"middle\">网口</text>\n<!-- ① PHY 芯片(黄=裕太微) -->\n<rect x=\"58\" y=\"67\" width=\"22\" height=\"12\" rx=\"2\" fill=\"#f3dd9b\" stroke=\"#cba94e\"/>\n<rect x=\"58\" y=\"89\" width=\"22\" height=\"12\" rx=\"2\" fill=\"#f3dd9b\" stroke=\"#cba94e\"/>\n<rect x=\"58\" y=\"111\" width=\"22\" height=\"12\" rx=\"2\" fill=\"#f3dd9b\" stroke=\"#cba94e\"/>\n<rect x=\"58\" y=\"133\" width=\"22\" height=\"12\" rx=\"2\" fill=\"#f3dd9b\" stroke=\"#cba94e\"/>\n<circle cx=\"69\" cy=\"57\" r=\"8.5\" fill=\"#e3b34a\" stroke=\"#c2922f\"/><text x=\"69\" y=\"61\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<text x=\"69\" y=\"166\" font-size=\"8\" font-weight=\"700\" fill=\"#9a7b2e\" text-anchor=\"middle\">PHY</text>\n<!-- 走线汇聚:网口→PHY→MAC→ASIC -->\n<line x1=\"80\" y1=\"73\" x2=\"92\" y2=\"73\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<line x1=\"80\" y1=\"95\" x2=\"92\" y2=\"95\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<line x1=\"80\" y1=\"117\" x2=\"92\" y2=\"117\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<line x1=\"80\" y1=\"139\" x2=\"92\" y2=\"139\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<line x1=\"92\" y1=\"73\" x2=\"92\" y2=\"139\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<line x1=\"92\" y1=\"107\" x2=\"98\" y2=\"107\" stroke=\"#b6cabc\" stroke-width=\"1.3\"/>\n<!-- ② MAC 虚线(常集成) -->\n<rect x=\"98\" y=\"98\" width=\"34\" height=\"18\" rx=\"3\" fill=\"#eef4f0\" stroke=\"#93bca5\" stroke-dasharray=\"4 3\"/>\n<circle cx=\"98\" cy=\"91\" r=\"8\" fill=\"#e3b34a\" stroke=\"#c2922f\"/><text x=\"98\" y=\"95\" font-size=\"9.5\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">2</text>\n<text x=\"115\" y=\"111\" font-size=\"8.5\" font-weight=\"700\" fill=\"#5f8a72\" text-anchor=\"middle\">MAC</text>\n<line x1=\"132\" y1=\"107\" x2=\"150\" y2=\"112\" stroke=\"#b6cabc\" stroke-width=\"1.3\" marker-end=\"url(#arn)\"/>\n<!-- ③ 交换 ASIC(黄=盛科) -->\n<rect x=\"150\" y=\"80\" width=\"74\" height=\"64\" rx=\"4\" fill=\"#f3dd9b\" stroke=\"#cba94e\" stroke-width=\"1.6\"/>\n<rect x=\"162\" y=\"92\" width=\"50\" height=\"40\" rx=\"2\" fill=\"#ecd089\"/>\n<circle cx=\"150\" cy=\"80\" r=\"9\" fill=\"#e3b34a\" stroke=\"#c2922f\"/><text x=\"150\" y=\"84\" font-size=\"10.5\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<text x=\"187\" y=\"108\" font-size=\"10.5\" font-weight=\"700\" fill=\"#8a6d24\" text-anchor=\"middle\">交换 ASIC</text>\n<text x=\"187\" y=\"124\" font-size=\"8\" fill=\"#a87f30\" text-anchor=\"middle\">★ 整机大脑</text>\n<!-- 配角(灰):CPU/内存/供电 -->\n<rect x=\"238\" y=\"66\" width=\"42\" height=\"22\" rx=\"3\" fill=\"#eef1f4\" stroke=\"#ccd4de\"/><text x=\"259\" y=\"80\" font-size=\"7.5\" fill=\"#aeb7c4\" text-anchor=\"middle\">CPU</text>\n<rect x=\"286\" y=\"66\" width=\"44\" height=\"22\" rx=\"3\" fill=\"#eef1f4\" stroke=\"#ccd4de\"/><text x=\"308\" y=\"80\" font-size=\"7.5\" fill=\"#aeb7c4\" text-anchor=\"middle\">内存</text>\n<rect x=\"238\" y=\"96\" width=\"92\" height=\"30\" rx=\"3\" fill=\"#eef1f4\" stroke=\"#ccd4de\"/><text x=\"284\" y=\"114\" font-size=\"7.5\" fill=\"#aeb7c4\" text-anchor=\"middle\">供电模块</text>\n<!-- 底部文字说明 -->\n<text x=\"16\" y=\"200\" font-size=\"9\" font-weight=\"700\" fill=\"#9a7b2e\">① PHY 物理层〔🟡〕:网口“收发员”,信号↔数字互译,没它不通</text>\n<text x=\"16\" y=\"220\" font-size=\"9\" fill=\"#2f7a82\">② MAC:认地址、切成数据包;常并进①或③里(画虚线)</text>\n<text x=\"16\" y=\"240\" font-size=\"9\" font-weight=\"700\" fill=\"#8a6d24\">③ 交换 ASIC〔🟡〕:正中最大那颗,整机大脑,决定数据走哪个口</text>\n<text x=\"16\" y=\"260\" font-size=\"9\" fill=\"#5f7180\">网口/光口:插网线或光模块,数据从这进出(本身不是芯片)</text>\n<text x=\"16\" y=\"282\" font-size=\"9\" font-weight=\"700\" fill=\"#516079\">一句话:①PHY 管“通不通”、③ASIC 管“往哪走”;🟡=你持仓做的环</text>\n</svg>", "flow": "掀开一台交换机从上往下看,就是一块电路板,上面的零件接力干活:\n· 前面板一排网口/光口:插网线或光模块的口子,数据从这儿进出(它本身不是芯片)。\n① PHY 物理层芯片〔🟡你持仓做这环〕:每个网口后面都紧贴一颗。网线里跑电信号、光纤里跑光信号,机器内部认的是数字信号,PHY 负责两边互相翻译——没它,网口根本不通。\n② MAC 层:“门牌管理员”,认地址、把数据切成一个个数据包。它通常不是单独一颗芯片,而是被并进 ①PHY 或 ③ASIC 里(所以画成虚线)。\n③ 交换 ASIC〔🟡你持仓做这环〕:板子正中间最大那颗,整台设备的“大脑”。所有网口的数据都汇到它这儿,它瞬间判断每一包该从哪个口送出去,再甩回对应的口——这是交换机里最贵、最难做的核心芯片。\n图里灰色的 CPU / 内存 / 供电模块:网管型交换机里真有这几样,但它们只管“后台管理”(跑系统、存配置、看状态)——专业叫“控制面”;真正高速转发数据的还是 ③ 交换 ASIC(叫“数据面”)。这几样不是你的自选股做的,只是让你看清一块真实电路板长什么样。\n一句话记住:① PHY 管“信号通不通”、③ 交换 ASIC 管“数据往哪走”——两个完全不同的环节,你持仓的分别做这两环,别混。(🟡=你持仓做的环,具体哪只看卡片)"}, "MLCC": {"name": "切开一颗 MLCC 看叠层断面(①-③)", "svg": "<svg viewBox=\"0 0 360 300\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" font-family=\"-apple-system,'PingFang SC','Microsoft YaHei',sans-serif\">\n<title>切开一颗MLCC看里面的叠层断面(①-③)</title><desc>一颗比芝麻还小的MLCC贴在电路板上,放大切开看断面:①陶瓷介质层与②内电极一层左一层右交错叠几百层,③两头端电极把同侧电极接出;左右电极交叠处=储电区。整颗由风华(民用)/火炬(军工)做。</desc>\n<rect x=\"0\" y=\"0\" width=\"360\" height=\"300\" rx=\"14\" fill=\"#fafdff\"/>\n<text x=\"16\" y=\"22\" font-size=\"12.5\" font-weight=\"700\" fill=\"#1d2433\">🔋 切开一颗 MLCC,看里面的叠层断面</text>\n<!-- 左:真实小电容贴在电路板上 -->\n<rect x=\"18\" y=\"70\" width=\"92\" height=\"58\" rx=\"6\" fill=\"#e7f0ea\" stroke=\"#93bca5\"/>\n<text x=\"64\" y=\"86\" font-size=\"8.5\" font-weight=\"700\" fill=\"#8a6d3a\" text-anchor=\"middle\">一颗 MLCC</text>\n<rect x=\"46\" y=\"92\" width=\"40\" height=\"18\" rx=\"2\" fill=\"#e7cfa3\" stroke=\"#c2a165\"/>\n<rect x=\"46\" y=\"92\" width=\"7\" height=\"18\" rx=\"1\" fill=\"#b3935f\"/><rect x=\"79\" y=\"92\" width=\"7\" height=\"18\" rx=\"1\" fill=\"#b3935f\"/>\n<rect x=\"46\" y=\"110\" width=\"10\" height=\"3\" fill=\"#c9b896\"/><rect x=\"76\" y=\"110\" width=\"10\" height=\"3\" fill=\"#c9b896\"/>\n<text x=\"64\" y=\"124\" font-size=\"7.5\" fill=\"#7b8497\" text-anchor=\"middle\">贴在电路板上</text>\n<text x=\"64\" y=\"144\" font-size=\"8\" font-weight=\"700\" fill=\"#b07d3a\" text-anchor=\"middle\">比芝麻还小</text>\n<!-- 放大锥 -->\n<line x1=\"88\" y1=\"92\" x2=\"150\" y2=\"52\" stroke=\"#c5ccd6\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/>\n<line x1=\"88\" y1=\"110\" x2=\"150\" y2=\"172\" stroke=\"#c5ccd6\" stroke-width=\"1\" stroke-dasharray=\"3 3\"/>\n<text x=\"118\" y=\"104\" font-size=\"8\" fill=\"#8593a6\" text-anchor=\"middle\">🔍放大切开</text>\n<!-- 右:断面(陶瓷体+内电极交错+两头端电极) -->\n<text x=\"225\" y=\"46\" font-size=\"7.5\" fill=\"#9aa3b1\" text-anchor=\"middle\">(示意 · 实际叠几百层)</text>\n<rect x=\"168\" y=\"52\" width=\"114\" height=\"120\" fill=\"#f1ead7\"/>\n<rect x=\"150\" y=\"52\" width=\"18\" height=\"120\" rx=\"1\" fill=\"#c9b896\" stroke=\"#a89668\"/>\n<rect x=\"282\" y=\"52\" width=\"18\" height=\"120\" rx=\"1\" fill=\"#c9b896\" stroke=\"#a89668\"/>\n<rect x=\"168\" y=\"60\" width=\"92\" height=\"6\" fill=\"#aab0bb\"/>\n<rect x=\"190\" y=\"76\" width=\"92\" height=\"6\" fill=\"#aab0bb\"/>\n<rect x=\"168\" y=\"92\" width=\"92\" height=\"6\" fill=\"#aab0bb\"/>\n<rect x=\"190\" y=\"108\" width=\"92\" height=\"6\" fill=\"#aab0bb\"/>\n<rect x=\"168\" y=\"124\" width=\"92\" height=\"6\" fill=\"#aab0bb\"/>\n<rect x=\"190\" y=\"140\" width=\"92\" height=\"6\" fill=\"#aab0bb\"/>\n<rect x=\"168\" y=\"156\" width=\"92\" height=\"6\" fill=\"#aab0bb\"/>\n<!-- 储电区 bracket -->\n<line x1=\"190\" y1=\"176\" x2=\"260\" y2=\"176\" stroke=\"#d98a8a\" stroke-width=\"1.3\"/>\n<line x1=\"190\" y1=\"172\" x2=\"190\" y2=\"176\" stroke=\"#d98a8a\" stroke-width=\"1.3\"/>\n<line x1=\"260\" y1=\"172\" x2=\"260\" y2=\"176\" stroke=\"#d98a8a\" stroke-width=\"1.3\"/>\n<text x=\"225\" y=\"189\" font-size=\"8\" font-weight=\"700\" fill=\"#b05757\" text-anchor=\"middle\">🔋 储电区·电存这儿</text>\n<!-- 右侧编号标签 -->\n<line x1=\"306\" y1=\"63\" x2=\"252\" y2=\"69\" stroke=\"#c2b79c\" stroke-width=\"0.8\"/>\n<circle cx=\"313\" cy=\"62\" r=\"7.5\" fill=\"#c3a675\" stroke=\"#a8895a\"/><text x=\"313\" y=\"65.5\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<text x=\"323\" y=\"66\" font-size=\"8.5\" font-weight=\"700\" fill=\"#927549\">陶瓷层</text>\n<line x1=\"306\" y1=\"108\" x2=\"262\" y2=\"111\" stroke=\"#9aa1ac\" stroke-width=\"0.8\"/>\n<circle cx=\"313\" cy=\"108\" r=\"7.5\" fill=\"#aab0bb\" stroke=\"#888f9c\"/><text x=\"313\" y=\"111.5\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">2</text>\n<text x=\"323\" y=\"112\" font-size=\"8.5\" font-weight=\"700\" fill=\"#5f6670\">内电极</text>\n<line x1=\"306\" y1=\"152\" x2=\"293\" y2=\"150\" stroke=\"#b8a878\" stroke-width=\"0.8\"/>\n<circle cx=\"313\" cy=\"152\" r=\"7.5\" fill=\"#c9b896\" stroke=\"#a89668\"/><text x=\"313\" y=\"155.5\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<text x=\"323\" y=\"156\" font-size=\"8.5\" font-weight=\"700\" fill=\"#8a7340\">端电极</text>\n<!-- 底部文字 -->\n<text x=\"16\" y=\"208\" font-size=\"9\" font-weight=\"700\" fill=\"#927549\">① 陶瓷介质层:一层层雾白陶瓷薄膜,绝缘“夹心”,薄到几微米</text>\n<text x=\"16\" y=\"228\" font-size=\"9\" font-weight=\"700\" fill=\"#5f6670\">② 内电极:夹在陶瓷间的金属薄片,一层伸左、一层伸右,交错叠</text>\n<text x=\"16\" y=\"248\" font-size=\"9\" font-weight=\"700\" fill=\"#8a7340\">③ 端电极:两头金属“帽子”,把同侧内电极接到一起、焊上板</text>\n<text x=\"16\" y=\"268\" font-size=\"9\" fill=\"#b05757\">🔋 左右电极交叠处存电——层数越多、陶瓷越薄,容量越大</text>\n<text x=\"16\" y=\"288\" font-size=\"9\" fill=\"#516079\">🟡 整颗 MLCC 都是你持仓做的(分民用/军工两条路);造法6步看弹窗大字</text>\n</svg>", "flow": "先搞懂它是干嘛的:电路板上的元件分两类——主动元件(芯片/CPU,会运算)和被动元件(电容/电阻/电感,不运算、只伺候芯片把电调顺)。MLCC 是用量最大的那种电容。\n· 电容像“小水库”:芯片瞬间要一大口电流,旁边的电容立刻“放水”补上,电压不掉。一台手机用上千颗,一个 AI 服务器机柜要用 40 多万颗(是普通服务器的 8-10 倍)。\n切开一颗 MLCC,里面是几百层“三明治”叠出来的:\n① 陶瓷介质层:一层层雾白陶瓷薄膜,绝缘的“夹心”,薄到几微米(比保鲜膜还薄)。\n② 内电极:夹在陶瓷层之间的金属薄片,一层伸向左、下一层伸向右,交错排列。\n③ 端电极:两头的金属“帽子”,把同一侧伸出的内电极全接到一起,再焊到电路板上。\n🔋 左右两组电极交叠、中间只隔一层薄陶瓷的地方,就是存电的地方——层数越多、陶瓷越薄,容量越大。\n它怎么造(6步):配料(陶瓷粉调浆)→ 流延(刮成几微米薄膜)→ 印电极(印上金属内电极)→ 叠层(几百层叠压)→ 烧结(高温烧成致密陶瓷块)→ 端电极(两头封金属、切割测试)。\n⚠️ 卡脖子在哪:高端要把陶瓷粉做得极细极纯、烧结控制极准,这两关被日韩(村田/三星电机/太阳诱电)垄断;中国占全球需求 40% 以上,但自给率不到 10%,国产替代主要在中低端,最高端短期还替不动。\n🟡 这板块你持仓做的都是“整只 MLCC”:一只以民用/车规为主、一只以军工/高可靠为主——同做电容,下游不同(具体哪只看卡片)。"}, "通信设备": {"name": "基站↔终端无线拓扑·军/民两条线(①-③)", "svg": "<svg viewBox=\"0 0 360 312\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" font-family=\"-apple-system,'PingFang SC','Microsoft YaHei',sans-serif\">\n<title>通信设备:基站↔终端,军用/民用两条线(①-③)</title><desc>①上游零件喂给两座基站;②设备=基站+终端(军用上海瀚讯:军用基站↔单兵/车载/无人机;民用5G信科移动:5G基站↔手机);③下游军方掏军费、运营商掏建网钱。两只同在②设备但下游不同。</desc>\n<defs><marker id=\"art\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L5,3 L0,6 Z\" fill=\"#aab4c2\"/></marker></defs>\n<rect x=\"0\" y=\"0\" width=\"360\" height=\"312\" rx=\"14\" fill=\"#fafdff\"/>\n<text x=\"16\" y=\"22\" font-size=\"12.5\" font-weight=\"700\" fill=\"#1d2433\">📡 通信设备:基站 ↔ 终端,军/民两条线</text>\n<!-- lane 背景 -->\n<rect x=\"84\" y=\"44\" width=\"268\" height=\"64\" rx=\"8\" fill=\"#eef7f1\" stroke=\"#cfe6d8\"/>\n<text x=\"338\" y=\"57\" font-size=\"7\" font-weight=\"700\" fill=\"#5a9377\" text-anchor=\"end\">🟡 你持仓做</text>\n<rect x=\"84\" y=\"146\" width=\"268\" height=\"64\" rx=\"8\" fill=\"#f1f0fa\" stroke=\"#ddd9ee\"/>\n<text x=\"338\" y=\"159\" font-size=\"7\" font-weight=\"700\" fill=\"#7a6fb0\" text-anchor=\"end\">🟡 你持仓做</text>\n<!-- ① 上游(共用) -->\n<rect x=\"16\" y=\"104\" width=\"58\" height=\"48\" rx=\"7\" fill=\"#eef2f8\" stroke=\"#9fb4d4\"/>\n<circle cx=\"24\" cy=\"104\" r=\"8\" fill=\"#74a9e0\"/><text x=\"24\" y=\"108\" font-size=\"10\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">1</text>\n<text x=\"45\" y=\"122\" font-size=\"8\" font-weight=\"700\" fill=\"#3f5e88\" text-anchor=\"middle\">上游零件</text>\n<text x=\"45\" y=\"134\" font-size=\"6.5\" fill=\"#7b8497\" text-anchor=\"middle\">芯片/射频</text>\n<text x=\"45\" y=\"144\" font-size=\"6.5\" fill=\"#7b8497\" text-anchor=\"middle\">光模块/PCB</text>\n<line x1=\"74\" y1=\"116\" x2=\"92\" y2=\"88\" stroke=\"#aab4c2\" stroke-width=\"1.3\" marker-end=\"url(#art)\"/>\n<line x1=\"74\" y1=\"140\" x2=\"92\" y2=\"184\" stroke=\"#aab4c2\" stroke-width=\"1.3\" marker-end=\"url(#art)\"/>\n<!-- 上线:军用基站② -->\n<path d=\"M110,60 L118,52 L126,60\" stroke=\"#8a93a0\" stroke-width=\"1.3\" fill=\"none\"/>\n<line x1=\"118\" y1=\"58\" x2=\"118\" y2=\"78\" stroke=\"#8a93a0\" stroke-width=\"1.3\"/>\n<rect x=\"100\" y=\"78\" width=\"36\" height=\"22\" rx=\"3\" fill=\"#f3dd9b\" stroke=\"#cba94e\"/>\n<circle cx=\"100\" cy=\"77\" r=\"7\" fill=\"#d39a4e\"/><text x=\"100\" y=\"80.5\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">2</text>\n<text x=\"118\" y=\"93\" font-size=\"7.5\" font-weight=\"700\" fill=\"#8a6d24\" text-anchor=\"middle\">军用基站</text>\n<path d=\"M142,74 Q151,89 142,104\" stroke=\"#86b89c\" stroke-width=\"1.2\" fill=\"none\"/>\n<path d=\"M148,77 Q155,89 148,101\" stroke=\"#86b89c\" stroke-width=\"1.2\" fill=\"none\"/>\n<path d=\"M154,80 Q159,89 154,98\" stroke=\"#86b89c\" stroke-width=\"1.2\" fill=\"none\"/>\n<rect x=\"184\" y=\"78\" width=\"13\" height=\"20\" rx=\"2\" fill=\"#dceee3\" stroke=\"#7cc49b\"/><line x1=\"190\" y1=\"78\" x2=\"190\" y2=\"72\" stroke=\"#7cc49b\" stroke-width=\"1.1\"/>\n<circle cx=\"216\" cy=\"84\" r=\"6\" fill=\"none\" stroke=\"#7cc49b\" stroke-width=\"1.2\"/><line x1=\"210\" y1=\"84\" x2=\"222\" y2=\"84\" stroke=\"#7cc49b\" stroke-width=\"1.1\"/>\n<text x=\"206\" y=\"105\" font-size=\"6.5\" fill=\"#2f7d56\" text-anchor=\"middle\">单兵/车载/无人机</text>\n<line x1=\"232\" y1=\"86\" x2=\"266\" y2=\"84\" stroke=\"#aab4c2\" stroke-width=\"1.3\" marker-end=\"url(#art)\"/>\n<rect x=\"270\" y=\"70\" width=\"74\" height=\"30\" rx=\"7\" fill=\"#e8f5ee\" stroke=\"#7cc49b\"/>\n<circle cx=\"278\" cy=\"70\" r=\"7.5\" fill=\"#62bd90\"/><text x=\"278\" y=\"73.5\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<text x=\"313\" y=\"84\" font-size=\"9\" font-weight=\"700\" fill=\"#2f7d56\" text-anchor=\"middle\">军方</text>\n<text x=\"313\" y=\"95\" font-size=\"6.5\" fill=\"#7b8497\" text-anchor=\"middle\">掏军费</text>\n<!-- 下线:5G基站② -->\n<path d=\"M110,162 L118,154 L126,162\" stroke=\"#8a93a0\" stroke-width=\"1.3\" fill=\"none\"/>\n<line x1=\"118\" y1=\"160\" x2=\"118\" y2=\"180\" stroke=\"#8a93a0\" stroke-width=\"1.3\"/>\n<rect x=\"100\" y=\"180\" width=\"36\" height=\"22\" rx=\"3\" fill=\"#f3dd9b\" stroke=\"#cba94e\"/>\n<circle cx=\"100\" cy=\"179\" r=\"7\" fill=\"#d39a4e\"/><text x=\"100\" y=\"182.5\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">2</text>\n<text x=\"118\" y=\"195\" font-size=\"7.5\" font-weight=\"700\" fill=\"#8a6d24\" text-anchor=\"middle\">5G基站</text>\n<path d=\"M142,176 Q151,191 142,206\" stroke=\"#9a90c8\" stroke-width=\"1.2\" fill=\"none\"/>\n<path d=\"M148,179 Q155,191 148,203\" stroke=\"#9a90c8\" stroke-width=\"1.2\" fill=\"none\"/>\n<path d=\"M154,182 Q159,191 154,200\" stroke=\"#9a90c8\" stroke-width=\"1.2\" fill=\"none\"/>\n<rect x=\"186\" y=\"178\" width=\"14\" height=\"26\" rx=\"3\" fill=\"#e6e2f5\" stroke=\"#b3a6e0\"/><line x1=\"189\" y1=\"182\" x2=\"197\" y2=\"182\" stroke=\"#b3a6e0\" stroke-width=\"1.1\"/>\n<text x=\"220\" y=\"196\" font-size=\"7\" fill=\"#6b4fb0\" text-anchor=\"middle\">手机</text>\n<line x1=\"234\" y1=\"190\" x2=\"266\" y2=\"184\" stroke=\"#aab4c2\" stroke-width=\"1.3\" marker-end=\"url(#art)\"/>\n<rect x=\"270\" y=\"170\" width=\"74\" height=\"32\" rx=\"7\" fill=\"#eef2f8\" stroke=\"#9fb4d4\"/>\n<circle cx=\"278\" cy=\"170\" r=\"7.5\" fill=\"#a187dc\"/><text x=\"278\" y=\"173.5\" font-size=\"9\" font-weight=\"700\" fill=\"#fff\" text-anchor=\"middle\">3</text>\n<text x=\"313\" y=\"184\" font-size=\"9\" font-weight=\"700\" fill=\"#4a5568\" text-anchor=\"middle\">运营商</text>\n<text x=\"313\" y=\"195\" font-size=\"6\" fill=\"#7b8497\" text-anchor=\"middle\">移动/电信/联通</text>\n<!-- 底部文字 -->\n<text x=\"16\" y=\"234\" font-size=\"9\" font-weight=\"700\" fill=\"#3f5e88\">① 上游零件:通信芯片/射频/光模块/PCB——造设备的“螺丝”</text>\n<text x=\"16\" y=\"254\" font-size=\"9\" font-weight=\"700\" fill=\"#8a6d24\">② 设备:基站(发信号)+终端〔🟡你持仓做:上=军用线、下=民用5G线〕</text>\n<text x=\"16\" y=\"274\" font-size=\"9\" font-weight=\"700\" fill=\"#516079\">③ 下游(买设备的):军方(掏军费) / 运营商(掏建网钱)</text>\n<text x=\"16\" y=\"296\" font-size=\"9\" fill=\"#b05757\">⚠️ 两只都在“②设备”,但一个吃军费、一个吃运营商建网钱——逻辑不同,别混</text>\n</svg>", "flow": "通信设备不是一个零件,是一条“上游做零件 → 中游拼设备 → 下游买设备”的链。你的自选股都在中游(做设备,具体哪只看卡片):\n① 上游零件:通信芯片、射频器件、光模块、PCB——造设备的“螺丝和发动机”,喂给两座基站。\n② 设备(🟡你持仓做的,是钱最多的一环)——“基站 + 终端”一发一收:\n　· 军用专网〔🟡你持仓做这环〕:军用基站/指挥设备 ((( 无线电波 ))) 单兵电台/车载台/无人机终端——给军队建“专属5G”,保密抗干扰。\n　· 民用5G〔🟡你持仓做这环〕:5G 基站铁塔 ((( 无线电波 ))) 你的手机——给运营商建公网,和华为/中兴是同环节对手。\n③ 下游(买设备的):军方(买军用专网) / 运营商移动电信联通(买民用5G主设备)。\n⚠️ 最关键一点:你这两环持仓都在“②设备”、看着像同行,但吃的饭完全不同——军用那条线吃军费(跟军队订单走,军工逻辑),民用5G那条线吃运营商建网开支(跟5G/6G周期走);逻辑和风险是两套,别混着看(具体哪只在哪条线看卡片)。"}};

}
function repMonths(t){const m=String(t).match(/(\d{4})-(\d{2})/);const td=TODAY.match(/(\d{4})-(\d{2})/);if(!m||!td)return 0;return (+td[1]-+m[1])*12+(+td[2]-+m[2]);}
function staleTag(t){const mo=repMonths(t);return mo>=6?` <span class="stale">⚠️ ${mo}个月前的研报·数据/预测可能已过时</span>`:'';}

 pre:"盘前=每天开盘前看:隔夜外盘对它的影响、今日跳空注意、昨晚突发。",

function daysUntil(d){const t=new Date(d+'T00:00:00'),n=new Date(TODAY.slice(0,10)+'T00:00:00');return Math.round((t-n)/86400000);}
function evColor(e){if(e.type==='unlock')return e.level==='high'?'#e24b4a':e.level==='mid'?'#e07c16':'#8a929c';return e.type==='report'?'#2f6df0':'#159a57';}

function eventTimeline(s){

}
function globalEvents(){

  return `<div class="gbanner"><div class="gh">📅 近期事件雷达 · 全部自选股(最近在上)</div>${rows}</div>`;
}
function prodList(t){
  // 把"核心产品"长串按 ①②③… 拆成每项一行,并加粗每项的要点(到第一个括号前)
  if(!t)return '';
  const re=/[①②③④⑤⑥⑦⑧⑨]/;
  const boldLead=p=>{const m=p.match(/^([^(（]+)([(（][\s\S]*)?$/);return (m&&m[2])?`<b>${m[1].trim()}</b>${m[2]}`:p;};
  if(re.test(t)){
    const first=t.search(re);
    const intro=t.slice(0,first).replace(/[:：]\s*$/,'').trim();
    const parts=t.slice(first).split(re).map(x=>x.trim().replace(/[；;。]\s*$/,'')).filter(Boolean);
    return (intro?`<div class="plintro">${intro}</div>`:'')+parts.map(p=>`<div class="pli">• ${boldLead(p)}</div>`).join('');
  }
  return `<div class="pli">${boldLead(t.replace(/。\s*$/,''))}</div>`;
}

    if(cats.length)pin=`<div class="pin news">📢 今日动静:${cats.join(' · ')}<span class="pinhint">详情见「盘后」</span></div>`;
  }
  // 公司速览
  let prof='';

  if(pp.length)prof+=`<div class="pos">${pp.join('')}</div>`;
  if(p.verdict)prof+=`<div class="verdict"><b>🎯 地位研判:</b>${p.verdict}</div>`;
  if(p.peers&&p.peers.length)prof+=`<div class="peers">🔗 同板块(${p.peer_board||''})的自选股 ${p.peers.length} 只:${p.peers.join('、')}<span class="peerhint">（随清单自动更新）</span></div>`;
  if(p.terms&&p.terms.length)prof+=`<details class="terms2"><summary>📖 名词小课堂 · ${p.terms.length}个(看不懂的词点开,大白话+例子)</summary>${p.terms.map(t=>`<div class="ti2">· <b>${t[0]}</b> — ${t[1]}</div>`).join('')}</details>`;
  const profSec=prof?`<div class="sec"><div class="sh">🏢 公司速览</div>${prof}</div>`:'';
  // 为什么涨
  let hotSec='';
  const ev=(hot.events||[]).map(e=>`<span class="ev">${e}</span>`).join('');
  if(ev||hot.chain){
    hotSec=`<div class="sec"><div class="sh">🔥 近期关注点 / 异动原因</div><div class="hot">${ev?'<div class="lab">机构关注:</div>'+ev:''}${hot.chain?'<div style="margin-top:5px"><span class="lab">解读:</span>'+hot.chain+'</div>':''}</div></div>`;
  }
  // 综合分析(只留一段大白话;原八维标签已删)
  let synSec='';
  if(syn.text){
    synSec=`<div class="sec"><div class="sh">📊 综合分析</div><div class="synth">${syn.text}</div></div>`;
  }
  // 研报财报
  let repSec='';
  if(reps.length){
    const hasRecent=reps.some(r=>repMonths(r.t)<6);          // 这只票有没有近6个月的研报
    const items=reps.map((r,idx)=>{
      const mo=repMonths(r.t);
      const hasDeep=(r.bk&&r.bk.length);                     // 有没有读到正文分点
      if(mo>=6){                                             // 超6个月:默认不放;除非该股没有近6月研报,则留最新这一篇(折叠+过时标)
        if(hasRecent||idx!==0) return '';
        const gist=hasDeep?`📌 总:${r.concl}`:`《${r.concl}》<span class="note">— 未读到正文</span>`;
        return `<div class="rep"><div class="rt">${r.t}${staleTag(r.t)}</div><div class="concl">${gist}</div><a href="${r.url}" target="_blank" rel="noreferrer noopener">🔗 看原文PDF</a></div>`;
      }
      if(!hasDeep){                                          // 近6月但没读到正文:只给标题+链接
        return `<div class="rep"><div class="rt">${r.t}</div><div class="concl">《${r.concl}》<span class="note">— 未读到正文</span></div><a href="${r.url}" target="_blank" rel="noreferrer noopener">🔗 看原文PDF</a></div>`;
      }
      const bks=(r.bk||[]).map(b=>`<div class="bki">· <b>${b[0]}</b>:${b[1]}</div>`).join('');
      const more=`<details class="more"><summary>精读脉络(结论+证据)</summary>${bks}</details>`;
      return `<div class="rep"><div class="rt">${r.t}</div><div class="concl">📌 总:${r.concl}</div>${more}<a href="${r.url}" target="_blank" rel="noreferrer noopener">🔗 看原文PDF</a></div>`;
    }).filter(x=>x).join('');
    // 去重名词框(只统计仍显示的<=2年研报)
    const seen={},allTerms=[];
    reps.forEach(r=>{if(repMonths(r.t)<=24)(r.tm||[]).forEach(t=>{if(t&&t[0]&&!seen[t[0]]){seen[t[0]]=1;allTerms.push(t);}});});
    const glossary=(items&&allTerms.length)?`<details class="more glossary"><summary>📖 本页名词解释（${allTerms.length} 个）</summary>${allTerms.map(t=>`<div class="ti"><b>${t[0]}</b> ${t[1]} <span class="tsrc">${t[2]||''}</span></div>`).join('')}</details>`:'';
    repSec=`<div class="sec"><div class="sh">📄 研报精读(总:结论 / 分:脉络证据)</div>${items||'<div class="empty2">近2年无新研报</div>'}${glossary}</div>`;
  }
  const picSec=s.pic?`<div class="pic">💡 ${s.pic}</div>`:'';
  // 公告精读(研究·仓库新板块):结构先就位,正文总分第二步接入;暂无则隐藏
  let notSec='';
  if(s.notices&&s.notices.length){
    let subst=s.notices.filter(n=>(n.bk||[]).length);       // 实质性:有分点(业务/合同/增减持/风险等)
    const proc=s.notices.filter(n=>!(n.bk||[]).length);     // 程序性:换届/决议/聘任等,没分点
    subst.sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));  // 新→旧
    const dropped=subst.length-3;                           // 只留最新3条实质公告,旧的按时间淘汰
    subst=subst.slice(0,3);
    const cap=dropped>0?`<div class="note" style="margin:2px 0 6px">只显示最新 3 条实质公告,更早的 ${dropped} 条已按时间淘汰(避免越堆越多)。</div>`:'';
    const substHTML=subst.map(n=>`<div class="rep" style="border-left-color:#7bb0f5;background:#fafcff"><div class="rt">${n.t}</div><div class="concl">📌 总:${n.concl}</div>${(n.bk||[]).map(b=>`<div class="bki">· <b>${b[0]}</b>:${b[1]}</div>`).join('')}<a href="${n.url||'#'}" target="_blank" rel="noreferrer noopener">🔗 看原文</a></div>`).join('');
    const procHTML=proc.length?`<div class="rep proc"><div class="rt">📋 常规通知 · ${proc.length}条<span class="note">(换届/决议/聘任等事务性)</span></div>${proc.map(n=>`<div class="pli">• <a href="${n.url||'#'}" target="_blank" rel="noreferrer noopener">《${n.t}》</a>${n.concl?'<span class="note"> — '+n.concl+'</span>':''}</div>`).join('')}</div>`:'';
    if(substHTML||procHTML)notSec=`<div class="sec"><div class="sh">📋 公告精读</div>${cap}${substHTML}${procHTML}</div>`;
  }
  const eventSec=eventTimeline(s);
  const yanjiu=`${profSec}${eventSec}${hotSec}${repSec}${notSec}${picSec}${synSec}`;   // 研究=仓库:速览/事件雷达/综合/研报精读/公告精读
  const body=TAB==='pre'?preHTML(s):TAB==='post'?postHTML(s):yanjiu;
  return `<div class="card ${cls(s.pct)}"><div class="strip"></div><div class="body">
    <div class="row1"><div><span class="name">${s.name}</span>${tag}<span class="code">${s.code||''}</span><br><button class="zoom" onclick="openZoom('${s.code}')">🔍 放大阅读</button></div>
      <div class="pct">${sign}${s.pct}%<small>${price}</small></div></div>
    ${pin}
    <div class="meta">${mp.map(x=>'<span>'+x+'</span>').join('')}</div>
    ${badges?`<div class="badges">${badges}</div>`:''}
    ${body}</div></div>`;
}
function preHTML(s){
  const p=s.pre;
  if(!p)return `<div class="empty2">🌅 盘前暂无记录(每个交易日开盘前自动生成)</div>`;
  let h='';
  if(p.influence)h+=`<div class="pblk core"><span class="lab">🌙 外盘对它的影响:</span>${p.influence}</div>`;
  if(p.event)h+=`<div class="pblk"><span class="lab">📅 临近事件:</span>${p.event}</div>`;
  if(p.yesterday)h+=`<div class="pblk"><span class="lab">📊 昨日小结:</span>${p.yesterday}</div>`;
  if(p.open)h+=`<div class="pblk"><span class="lab">⚡ 开盘参考:</span>${p.open}</div>`;
  return `<div class="sec">${h||'<div class="empty2">盘前暂无</div>'}</div>`;
}
function postHTML(s){
  const arr=s.post;
  if(!arr||!arr.length)return `<div class="empty2">🌆 盘后暂无记录<br>每个交易日收盘后在这里追加一条带日期动态(最新在上):今日异动小结 + 新公告/龙虎榜/财报。</div>`;
  const ents=arr.map((e,i)=>`<div class="ent ${i===0?'today':''}"><div class="date">📆 ${e.date}${i===0?'<span class="new">最新</span>':''}</div>`+
    [['⚡ 异动',e['异动']],['📢 公告',e['公告']],['🏆 龙虎榜',e['龙虎']],['📈 财报',e['财报']]].filter(x=>x[1]).map(x=>`<div class="li"><span class="k">${x[0]}</span>${x[1]}</div>`).join('')+`</div>`).join('');
  return `<div class="sh">🌆 盘后时间线(最新在上,每天追加)</div><div class="tl">${ents}</div>`;
}
function colorPct(s){return String(s).replace(/([+＋][\d.]+\s*%)/g,'<span class="up">$1</span>').replace(/(-[\d.]+\s*%)/g,'<span class="dn">$1</span>');}
function openZoom(code){const s=STOCKS.find(x=>x.code===code);if(!s)return;
  const prev=TAB;TAB='yanjiu';                 // 放大=这只票的完整页:研究 + 盘前 + 盘后,一次看全
  let html=card(s);
  html+=`<div class="card"><div class="body"><div class="sh" style="margin-top:0">🌅 盘前</div>${preHTML(s)}</div></div>`;
  html+=`<div class="card"><div class="body">${postHTML(s)}</div></div>`;
  TAB=prev;
  const w=document.getElementById('zoomwrap');w.innerHTML=html;
  w.querySelectorAll('details').forEach(d=>d.open=true);
  document.getElementById('modal').style.display='block';document.body.style.overflow='hidden';}
function closeZoom(){document.getElementById('modal').style.display='none';document.body.style.overflow='';}
function openFlow(key,code){const b=BOARDS[key];if(!b)return;
  const s=code?STOCKS.find(x=>x.code===code):null;const pr=(s&&s.profile)||{};
  let same='';
  if(pr.role){
    const peers=STOCKS.filter(x=>x.code!==code&&((x.profile||{}).role===pr.role)).map(x=>x.name);
    same=peers.length?`跟【${s.name}】做相同的(都在「${pr.role}」这一环)还有:${peers.join('、')}`
                      :`你的关注列表里,目前就【${s.name}】一只做「${pr.role}」这一环。`;
  }
  const w=document.getElementById('zoomwrap');
  w.innerHTML=`<div class="card"><div class="body"><div class="sh" style="margin-top:0">📦 ${b.name}</div>`+
    `<div class="vdiag">${b.svg}</div>`+
    (s&&pr.makes?`<div class="makes big">👉 这只【${s.name}】做的,就是图里的 <b>${pr.makes}</b></div>`:'')+
    `<div class="flow big"><b>⚙️ 这条链怎么运作(①-⑧ 大白话)</b><div class="pre">${b.flow}</div></div>`+
    (same?`<div class="who big"><b>🏭 跟这只做相同的股票</b><div class="pre">${same}</div></div>`:'')+
    `</div></div>`;
  document.getElementById('modal').style.display='block';document.body.style.overflow='hidden';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeZoom();});
function render(){const list=STOCKS.filter(match).sort(sorter);
  document.getElementById('cnt').textContent=list.length;
  preBanner();
  grid.innerHTML=list.length?list.map(card).join(''):'<div class="empty">没有符合条件的股票</div>';}
chips.addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;
  chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');filter=c.dataset.f;render();});
document.getElementById('q').addEventListener('input',e=>{kw=e.target.value.trim();render();});
document.getElementById('sort').addEventListener('change',e=>{sort=e.target.value;render();});
document.getElementById('tabs').addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');TAB=t.dataset.t;
  document.getElementById('tabhint').textContent=TABHINT[TAB];render();});
render();
</script></body></html>
